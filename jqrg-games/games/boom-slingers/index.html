<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="/jq.ico">
  
<!-- JQRG_CLOUD_INJECT_BEGIN --><script src="/js/jqrg-cloud.js" defer></script><script src="/js/jqrg-auth-ui.js" defer></script><!-- JQRG_CLOUD_INJECT_END -->
</head>
  <body style="margin:0;padding:0" class="noselect">
    <div id="loading-text" style="color: black; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;">LOADING...</div>
    <canvas id="unity-canvas"
      style="position:fixed;top:0;left:0;width:100%;height:100%;outline:none"></canvas>

    <script>
    const SPLIT_PARTS = {
      "2cbda98ae67d1b28f920398806093415.wasm": [
        "Build/2cbda98ae67d1b28f920398806093415.wasm.part1",
        "Build/2cbda98ae67d1b28f920398806093415.wasm.part2"
      ],
      "3b03bb7182763a41817b795e550d8412.data": [
        "Build/3b03bb7182763a41817b795e550d8412.data.part1",
        "Build/3b03bb7182763a41817b795e550d8412.data.part2"
      ]
    };

    const MERGED_MIME_TYPES = {
      "2cbda98ae67d1b28f920398806093415.wasm": "application/wasm",
      "3b03bb7182763a41817b795e550d8412.data": "application/octet-stream"
    };
    </script>

    <script>
    async function mergeParts(parts, mimeType) {
      if (!parts || parts.length === 0) return null;

      const buffers = await Promise.all(parts.map(async (u) => {
        const r = await fetch(u);
        if (!r.ok) throw new Error("Failed part " + u);
        return new Uint8Array(await r.arrayBuffer());
      }));

      const total = buffers.reduce((a, b) => a + b.length, 0);
      const merged = new Uint8Array(total);
      let offset = 0;
      for (const b of buffers) { merged.set(b, offset); offset += b.length; }

      return URL.createObjectURL(new Blob([merged], { type: mimeType || "application/octet-stream" }));
    }

    async function preMergeAll() {
      const map = {};
      const files = Object.entries(SPLIT_PARTS);
      const total = files.length;
      let done = 0;

      const loadingText = document.getElementById("loading-text");

      for (const [file, parts] of files) {
        const merged = await mergeParts(parts, MERGED_MIME_TYPES[file]);
        map[file] = merged;
        done++;
        const percent = Math.floor((done / total) * 100);
        loadingText.innerText = `LOADING... ${percent}%`;
        console.log("Premerged:", file, "→", merged);
      }

      loadingText.style.display = "none";

      return map;
    }

    function loadScriptOnce(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${src}"]`);
        if (existing) {
          if (existing.dataset.loaded === "true") {
            resolve(existing);
            return;
          }
          existing.addEventListener("load", () => resolve(existing), { once: true });
          existing.addEventListener("error", reject, { once: true });
          return;
        }

        const script = document.createElement("script");
        script.src = src;
        script.addEventListener("load", () => {
          script.dataset.loaded = "true";
          resolve(script);
        }, { once: true });
        script.addEventListener("error", reject, { once: true });
        document.head.appendChild(script);
      });
    }

    async function initCrazyGamesSdk() {
      await loadScriptOnce("cg-sdk.js");

      const sdk = window.CrazyGames && window.CrazyGames.SDK;
      if (!sdk || typeof sdk.init !== "function") {
        throw new Error("CrazyGames SDK did not load correctly.");
      }

      if (!window.__boomSlingersCgInitPromise) {
        window.__boomSlingersCgInitPromise = sdk.init({
          wrapper: {
            engine: "unity",
            sdkVersion: "3.6.0"
          }
        }).catch((error) => {
          window.__boomSlingersCgInitPromise = null;
          throw error;
        });
      }

      await window.__boomSlingersCgInitPromise;

      // Disable in-game ad requests to prevent midgame ad overlays.
      if (sdk.ad) {
        sdk.ad.requestAd = () => Promise.resolve({ success: false, noAd: true });
        sdk.ad.hasAdblock = () => Promise.resolve(false);
        sdk.ad.addAdblockPopupListener = () => {};
      }

      return sdk;
    }

    function installCgSdkReuseHook() {
      if (window.__boomSlingersCgHookInstalled) return;
      window.__boomSlingersCgHookInstalled = true;

      const isCgSdkScript = (src) => {
        if (typeof src !== "string" || src.length === 0) return false;
        try {
          const absolute = new URL(src, window.location.href);
          return absolute.pathname.endsWith("/cg-sdk.js");
        } catch (_) {
          return src.endsWith("cg-sdk.js");
        }
      };

      const originalAppendChild = Node.prototype.appendChild;
      const originalAddEventListener = HTMLScriptElement.prototype.addEventListener;

      Node.prototype.appendChild = function(node) {
        if (
          node &&
          node.tagName === "SCRIPT" &&
          isCgSdkScript(node.src) &&
          window.CrazyGames &&
          window.CrazyGames.SDK
        ) {
          node.dataset.cgSdkSkipped = "true";
          return node;
        }

        return originalAppendChild.call(this, node);
      };

      HTMLScriptElement.prototype.addEventListener = function(type, listener, options) {
        if (
          type === "load" &&
          this.dataset &&
          this.dataset.cgSdkSkipped === "true"
        ) {
          // Fire synchronously so _InitSDK's callback chain runs immediately,
          // before Unity's main loop can start a frame that uses SDK methods.
          listener.call(this, new Event("load"));
          return;
        }

        return originalAddEventListener.call(this, type, listener, options);
      };
    }

    (async () => {
      const mergedMap = await preMergeAll();
      window.SPLIT_PARTS = mergedMap;
      const origFetch = window.fetch;
      window.fetch = async function(resource, options) {
        if (typeof resource === "string") {
          const key = resource.split("/").pop();
          if (mergedMap[key]) {
            console.log("Redirect fetch:", key);
            return origFetch(mergedMap[key], options);
          }
        }
        return origFetch(resource, options);
      };

      const OrigXHR = window.XMLHttpRequest;
      window.XMLHttpRequest = function() {
        const xhr = new OrigXHR();
        const origOpen = xhr.open;
        xhr.open = function(method, url, ...rest) {
          const key = url.split("/").pop();
          if (mergedMap[key]) {
            console.log("Redirect XHR:", key);
            origOpen.call(xhr, method, mergedMap[key], ...rest);
          } else {
            origOpen.call(xhr, method, url, ...rest);
          }
        };
        return xhr;
      };

      // Some local/non-CrazyGames SDK bundles do not expose this callback API.
      // Provide a no-op fallback so Unity init does not fail on missing method.
      const compatTimer = setInterval(() => {
        const sdk = window.CrazyGames && window.CrazyGames.SDK;
        if (!sdk || !sdk.ad) return;
        if (typeof sdk.ad.addAdblockPopupListener !== "function") {
          sdk.ad.addAdblockPopupListener = function() {};
        }
        clearInterval(compatTimer);
      }, 50);

      installCgSdkReuseHook();
      await initCrazyGamesSdk();

      // Wrap SDK.init so re-calls from the Unity framework resolve synchronously.
      // The framework's _InitSDK calls SDK.init().then(cb) — if .then() is async,
      // SendMessage("CrazySDKSingleton","JSLibCallback_Init") arrives too late and
      // C# game code throws "CrazySDK initialization required".
      // Returning a sync thenable makes the entire callback chain run in the same
      // tick as _InitSDK, before Unity's main loop starts calling SDK methods.
      const _origSdkInit = window.CrazyGames.SDK.init.bind(window.CrazyGames.SDK);
      window.CrazyGames.SDK.init = function(opts) {
        _origSdkInit(opts);            // keep internal state up to date (no-op / returns same promise)
        const syncThenable = {
          then(cb)  { if (cb) cb(); return syncThenable; },
          catch()   { return syncThenable; },
          finally(cb) { if (cb) cb(); return syncThenable; }
        };
        return syncThenable;
      };

      const canvas = document.querySelector("#unity-canvas");
      const loaderUrl = "Build/d37667e316197a45bf53aa3fdcc6dee6.loader.js";
      const config = {
        dataUrl: "Build/3b03bb7182763a41817b795e550d8412.data",
        frameworkUrl: "Build/8ff9826371bd14e0e81ec413c9e15bb1.framework.js",
        codeUrl: "Build/2cbda98ae67d1b28f920398806093415.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Boom Slingers ReBoom",
        productName: "Boom Slingers ReBoom",
        productVersion: "1.0.0"
      };

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {}).then((unityInstance) => {
          window.gameInstance = unityInstance;
        }).catch((message) => alert(message));
      };
      document.body.appendChild(script);
    })();
    </script>

    <script>
    function resizeCanvas() {
      const canvas = document.getElementById("unity-canvas");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
    }
    window.addEventListener("load", resizeCanvas);
    window.addEventListener("resize", resizeCanvas);
    </script>
  </body>
</html>
