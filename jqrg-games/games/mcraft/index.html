<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Launcher</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: #fff;
      overflow: hidden;
    }

    body {
      background: url("/eaglercraft-background.png") center center / cover no-repeat fixed;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.52);
    }

    .panel {
      position: relative;
      z-index: 1;
      width: min(760px, 92vw);
      text-align: center;
      padding: 28px 22px;
      border-radius: 14px;
      background: rgba(10, 10, 10, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
    }

    .warning {
      margin: 0 0 20px;
      font-size: clamp(20px, 3.4vw, 34px);
      line-height: 1.35;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
    }

    .countdown {
      margin: 0 0 24px;
      font-size: clamp(22px, 3.8vw, 38px);
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.75);
    }

    .skip-btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 18px;
      font-weight: 700;
      color: #111;
      background: #ffffff;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
      box-shadow: 0 7px 16px rgba(0, 0, 0, 0.35);
    }

    .skip-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.42);
    }

    .skip-btn:active {
      transform: translateY(0);
    }
  </style>

<!-- JQRG_CLOUD_INJECT_BEGIN --><script src="/js/jqrg-cloud.js" defer></script><script src="/js/jqrg-auth-ui.js" defer></script><!-- JQRG_CLOUD_INJECT_END -->
</head>
<body>
  <main class="panel">
    <p class="warning">This version of Minecraft is extremely unstable and has many bugs.</p>
    <p class="countdown" id="countdownText">Starting in 5</p>
    <button class="skip-btn" id="skipBtn" type="button">Skip Countdown</button>
  </main>

  <script>
    const REDIRECT_URL = "https://mcraft.fly.dev";
    const countdownText = document.getElementById("countdownText");
    const skipBtn = document.getElementById("skipBtn");

    let secondsRemaining = 5;
    let redirected = false;

    function goToGame() {
      if (redirected) return;
      redirected = true;
      window.location.href = REDIRECT_URL;
    }

    function renderCountdown() {
      countdownText.textContent = "Starting in " + secondsRemaining;
    }

    renderCountdown();

    const timer = setInterval(() => {
      secondsRemaining -= 1;
      if (secondsRemaining <= 0) {
        clearInterval(timer);
        goToGame();
        return;
      }
      renderCountdown();
    }, 1000);

    skipBtn.addEventListener("click", () => {
      clearInterval(timer);
      goToGame();
    });
  </script>
</body>
</html>
