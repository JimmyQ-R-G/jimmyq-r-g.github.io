<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0}
.wrap{display:flex;flex-direction:column;height:100%}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#16213e;border-bottom:1px solid #0f3460}
.toolbar h1{font-size:15px;font-weight:600;margin-right:auto;color:#e94560}
.toolbar button{padding:6px 16px;border:1px solid #0f3460;border-radius:4px;background:#0f3460;color:#e0e0e0;cursor:pointer;font-size:13px;transition:background .15s}
.toolbar button:hover{background:#e94560;border-color:#e94560;color:#fff}
.toolbar input[type="text"]{padding:5px 8px;border:1px solid #0f3460;border-radius:4px;background:#1a1a2e;color:#e0e0e0;font-size:13px;width:140px}
.main{display:flex;flex:1;min-height:0}
.editor-pane{flex:1;display:flex;flex-direction:column;min-width:0}
.editor-pane textarea{flex:1;resize:none;border:none;outline:none;padding:12px;font-family:"Consolas","Monaco","Courier New",monospace;font-size:14px;line-height:1.5;background:#0a0a1a;color:#a9b7c6;tab-size:2}
.preview-pane{flex:1;display:flex;flex-direction:column;border-left:1px solid #0f3460;min-width:0}
.preview-pane .label{padding:6px 12px;font-size:12px;background:#16213e;border-bottom:1px solid #0f3460;color:#888}
.preview-pane iframe{flex:1;border:none;background:#fff}
@media(max-width:700px){.main{flex-direction:column}.preview-pane{border-left:none;border-top:1px solid #0f3460}}
</style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <h1>HTML Tester</h1>
    <input type="text" id="filename" value="page.html" placeholder="filename">
    <button id="runBtn">&#9654; Run</button>
    <button id="dlBtn">Download</button>
    <button id="clearBtn">Clear</button>
    <button id="newTabBtn">Open in Tab</button>
  </div>
  <div class="main">
    <div class="editor-pane">
      <textarea id="code" spellcheck="false">&lt;!doctype html&gt;
&lt;html lang="en"&gt;
&lt;head&gt;
  &lt;meta charset="utf-8"&gt;
  &lt;title&gt;My Page&lt;/title&gt;
&lt;/head&gt;
&lt;body&gt;
  &lt;h1&gt;Hello world&lt;/h1&gt;
  &lt;p&gt;Edit this and click Run.&lt;/p&gt;
&lt;/body&gt;
&lt;/html&gt;</textarea>
    </div>
    <div class="preview-pane">
      <div class="label">Preview</div>
      <iframe id="preview"></iframe>
    </div>
  </div>
</div>
<script>
var code=document.getElementById('code');
var preview=document.getElementById('preview');
var filenameEl=document.getElementById('filename');

function run(){
  var doc=preview.contentDocument||preview.contentWindow.document;
  doc.open();doc.write(code.value);doc.close();
}

document.getElementById('runBtn').addEventListener('click',run);

document.getElementById('dlBtn').addEventListener('click',function(){
  var fn=(filenameEl.value||'page.html').trim()||'page.html';
  var blob=new Blob([code.value],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=fn;document.body.appendChild(a);a.click();a.remove();
  setTimeout(function(){URL.revokeObjectURL(url)},5000);
});

document.getElementById('clearBtn').addEventListener('click',function(){
  if(confirm('Clear the editor?'))code.value='';
});

document.getElementById('newTabBtn').addEventListener('click',function(){
  var w=window.open('','_blank');
  w.document.open();w.document.write(code.value);w.document.close();
});

document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='s'){e.preventDefault();run();}
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='enter'){e.preventDefault();run();}
});

run();
</script>
</body>
</html>
