<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#0e0514;
  --bg-card:rgba(0,0,0,0.3);
  --border:rgba(255,255,255,0.5);
  --border-light:rgba(255,255,255,0.15);
  --text:#fff;
  --text-dim:rgba(255,255,255,0.6);
  --pill-bg:rgba(255,255,255,0.1);
  --dropdown-bg:rgba(13,5,18,0.75);
  --search-pill-bg:rgba(14,5,20,0.75);
  --accent-purple:rgba(136,65,214,1);
  --sidebar-w:54px;
  --top-bar-h:54px;
}
html,body{
  height:100%;overflow:hidden;
  font-family:'Oxanium',sans-serif;
  color:var(--text);background:#000;
}

.bg{
  position:fixed;inset:0;z-index:0;
  background:conic-gradient(from 90deg,#342c8a,#211f39,#5b2d7d,#000,#352f72);
  filter:blur(32px);opacity:.7;
}
.bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.3),rgba(0,0,0,.6));
}

#app{
  position:relative;z-index:1;
  width:100%;height:100%;
  display:flex;flex-direction:column;
}

.top-bar{
  height:var(--top-bar-h);min-height:var(--top-bar-h);
  background:var(--bg-deep);
  display:flex;align-items:center;
  padding:0 16px;gap:12px;
}

.body-row{display:flex;flex:1;min-height:0}

.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--bg-deep);
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0 14px;gap:6px;
}

.sidebar .logo{
  width:34px;height:46px;cursor:pointer;margin-bottom:4px;flex-shrink:0;
  filter:drop-shadow(0 0 13px var(--accent-purple));
  transition:transform .35s ease,filter .35s ease;
}
.logo-shape{
  width:100%;height:100%;
  background:conic-gradient(from 90deg,#00FAFF 0deg,#A500FF 117.7deg,#FF3D8E 211.2deg,#0400FF 315deg,#00FAFF 360deg);
  -webkit-mask-image:url("data:image/svg+xml,%3Csvg viewBox='8 10 36 48' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill-rule='evenodd' d='M42.334 28L29.964 40.37V55.845H22.478V40.37L10.107 28L26.221 11.887L42.334 28ZM16.498 28.027L26.221 37.749L35.942 28.027L26.221 18.324L16.498 28.027Z' fill='white'/%3E%3C/svg%3E");
  mask-image:url("data:image/svg+xml,%3Csvg viewBox='8 10 36 48' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill-rule='evenodd' d='M42.334 28L29.964 40.37V55.845H22.478V40.37L10.107 28L26.221 11.887L42.334 28ZM16.498 28.027L26.221 37.749L35.942 28.027L26.221 18.324L16.498 28.027Z' fill='white'/%3E%3C/svg%3E");
  -webkit-mask-size:contain;mask-size:contain;
  -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
  -webkit-mask-position:center;mask-position:center;
}
.sidebar .logo:hover{transform:scale(1.12);filter:drop-shadow(0 0 20px var(--accent-purple)) drop-shadow(0 0 6px #fff)}
.sidebar .logo svg{width:100%;height:100%;display:block}
.sidebar nav{
  display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;
}
.sidebar nav button{
  width:38px;height:38px;border:0;background:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;transition:background .35s ease,transform .35s ease;
}
.sidebar nav button:hover{background:rgba(255,255,255,.08);transform:scale(1.08)}
.sidebar nav button svg{
  width:20px;height:20px;stroke:var(--text);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;
  opacity:.55;transition:opacity .35s ease,filter .35s ease,transform .35s ease;
}
.sidebar nav button[data-nav="games"] svg{
  fill:var(--text);stroke:none;stroke-width:0;
}
.sidebar nav button:hover svg{opacity:.8;transform:translateY(-1px)}
.sidebar nav button.active svg{
  opacity:1;
  filter:drop-shadow(0 0 6.75px #fff) drop-shadow(0 0 6.75px #fff);
}
.sidebar nav button{
  opacity:0;animation:fadeInUp .35s ease forwards;
}
.sidebar nav button:nth-child(1){animation-delay:.05s}
.sidebar nav button:nth-child(2){animation-delay:.1s}
.sidebar nav button:nth-child(3){animation-delay:.15s}
.sidebar nav button:nth-child(4){animation-delay:.2s}
.sidebar nav button:nth-child(5){animation-delay:.25s}

.main{
  flex:1;display:flex;flex-direction:column;min-width:0;
  overflow:hidden;position:relative;
  border-left:1.5px solid var(--border);
  border-top:1.5px solid var(--border);
  border-top-left-radius:24px;
}

/* ══ TOP BAR ══ */
.top-bar .brand-wrap{
  flex-shrink:0;cursor:pointer;margin-right:4px;
  display:flex;align-items:center;
  transition:transform .35s ease,filter .35s ease;
  filter:drop-shadow(0 0 6px rgba(136,65,214,.6));
}
.top-bar .brand-wrap:hover{transform:scale(1.06);filter:drop-shadow(0 0 14px var(--accent-purple)) drop-shadow(0 0 4px #fff)}
.top-bar .brand-svg{height:28px;width:auto;display:block}
.top-bar .settings-top{
  width:34px;height:34px;border:0;background:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;flex-shrink:0;
  transition:background .35s ease;
}
.top-bar .settings-top:first-of-type{margin-left:auto}
.top-bar .settings-top:hover{background:rgba(255,255,255,.08)}
.top-bar .settings-top svg{
  width:20px;height:20px;stroke:var(--text);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:.7;
  transition:transform .5s ease,opacity .35s ease;
}
.top-bar .settings-top:hover svg{opacity:1}

.tb-section{display:none;flex:1;align-items:center;gap:10px;min-width:0}
#app[data-page="home"] .tb-home,
#app[data-page="games"] .tb-games,
#app[data-page="apps"] .tb-apps{display:flex}
.tb-section.tb-exiting{display:flex;pointer-events:none}

.tb-section .nav-btns{display:flex;gap:4px;align-items:center;flex-shrink:0}
.tb-section .nav-btns button{
  width:30px;height:30px;border:0;background:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;transition:background .3s ease,transform .3s ease;
}
.tb-section .nav-btns button:hover{background:rgba(255,255,255,.08);transform:scale(1.1)}
.tb-section .nav-btns button svg{
  width:18px;height:18px;stroke:var(--text);stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;fill:none;
}

.url-bar,.search-bar{
  flex:1;height:38px;border-radius:19px;min-width:0;
  background:var(--pill-bg);
  display:flex;align-items:center;padding:0 16px;gap:10px;
  border:1.5px solid transparent;
  transition:border-color .35s ease,box-shadow .35s ease;
}
.url-bar:focus-within,.search-bar:focus-within{
  border-color:rgba(255,255,255,.3);
  box-shadow:0 0 12px rgba(136,65,214,.3);
}
.url-bar svg,.search-bar svg{
  width:18px;height:18px;stroke:var(--text-dim);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;flex-shrink:0;
}
.url-bar input,.search-bar input{
  flex:1;background:0;border:0;outline:0;color:var(--text);
  font-family:inherit;font-size:14px;min-width:0;
}
.url-bar input::placeholder,.search-bar input::placeholder{color:var(--text-dim)}

.search-filter-wrap{position:relative;flex-shrink:0}
.search-filter-btn{
  background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;
  border-radius:6px;transition:background .2s,color .2s;color:var(--text-dim);
}
.search-filter-btn svg{width:16px;height:16px}
.search-filter-btn:hover,.search-filter-btn.active{color:#fff;background:rgba(255,255,255,.1)}
.search-filter-menu{
  display:none;position:absolute;right:0;top:calc(100% + 8px);z-index:90;
  background:rgba(18,10,28,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:6px 0;
  min-width:170px;box-shadow:0 8px 30px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.05);
  animation:fadeInUp .2s ease;
}
.search-filter-menu.open{display:block}
.filter-check-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;cursor:pointer;color:rgba(255,255,255,.75);
  font-size:13px;transition:background .2s ease,color .2s ease;
}
.filter-check-row:hover{background:rgba(255,255,255,.08);color:#fff}
.filter-check-row.selected{color:#fff;font-weight:500}
.filter-check-row span{flex:1}
.filter-toggle{
  width:36px;height:20px;border-radius:10px;cursor:pointer;
  background:rgba(255,255,255,.15);position:relative;flex-shrink:0;
  transition:background .35s ease;
}
.filter-toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:14px;height:14px;border-radius:50%;background:#fff;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
}
.filter-toggle.active{background:var(--accent-purple)}
.filter-toggle.active::after{transform:translateX(16px)}

.dropdown{position:relative;flex-shrink:0}
.dropdown-btn{
  height:43px;min-width:180px;border-radius:13px;
  background:var(--dropdown-bg);
  border:1px solid var(--border);
  color:var(--text);font-family:inherit;font-size:16px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;gap:10px;cursor:pointer;
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  transition:border-color .3s ease,box-shadow .3s ease;
}
.dropdown-btn:hover{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.1)}
.dropdown-btn svg{width:16px;height:8px;fill:#fff;stroke:none;transition:transform .35s ease}
.dropdown.open .dropdown-btn svg{transform:rotate(180deg)}
.dropdown-menu{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--dropdown-bg);border:1px solid var(--border);
  border-radius:13px;padding:6px 0;
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  z-index:50;
  opacity:0;transform:translateY(-8px);pointer-events:none;
  transition:opacity .3s ease,transform .3s ease;
}
.dropdown.open .dropdown-menu{opacity:1;transform:translateY(0);pointer-events:auto}
.dropdown-menu button{
  display:block;width:100%;text-align:left;padding:8px 16px;
  background:0;border:0;color:var(--text);font-family:inherit;font-size:15px;
  cursor:pointer;transition:background .3s ease,padding-left .3s ease;
}
.dropdown-menu button:hover{background:rgba(255,255,255,.08);padding-left:22px}
.dropdown-menu hr{border:0;border-top:1px solid var(--border);margin:4px 12px}

/* ══ PAGES ══ */
.page{
  display:none;flex:1;overflow-y:auto;overflow-x:hidden;padding:0;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;
}
.page.active{display:flex;flex-direction:column;animation:fadeInPage .4s ease}
.page::-webkit-scrollbar{width:6px}
.page::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}

/* ══ HOME ══ */
#page-home{align-items:center;justify-content:flex-start;padding-top:20px;gap:20px}
.home-hero{
  display:flex;flex-direction:column;align-items:center;gap:28px;
  padding:40px 20px 20px;width:100%;max-width:900px;
}
.home-hero h1{
  font-size:52px;font-weight:400;text-align:center;
  opacity:0;animation:fadeInUp .5s ease forwards;
}
.home-search-bar{
  opacity:0;animation:fadeInUp .5s ease .08s forwards;
  width:100%;max-width:676px;height:57px;border-radius:28.5px;
  background:var(--search-pill-bg);border:1.5px solid #fff;
  display:flex;align-items:center;padding:0 24px;gap:12px;
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  transition:box-shadow .4s ease,border-color .4s ease;
}
.home-search-bar:focus-within{
  box-shadow:0 0 20px rgba(136,65,214,.4),0 0 40px rgba(136,65,214,.15);
  border-color:rgba(255,255,255,.8);
}
.home-search-bar svg{
  width:20px;height:20px;stroke:var(--text-dim);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;flex-shrink:0;
}
.home-search-bar input{
  flex:1;background:0;border:0;outline:0;color:var(--text);
  font-family:inherit;font-size:20px;
}
.home-search-bar input::placeholder{color:var(--text-dim)}
.home-cards{
  display:flex;gap:24px;flex-wrap:wrap;justify-content:center;padding:10px 0 40px;
}
.home-card{
  opacity:0;animation-duration:.5s;animation-timing-function:cubic-bezier(.25,.46,.45,.94);animation-fill-mode:forwards;
}
.home-card:nth-child(1){animation-delay:.05s}
.home-card:nth-child(2){animation-delay:.15s}
.home-card:nth-child(3){animation-delay:.25s}
.home-card{
  width:300px;height:220px;border-radius:20px;
  background:var(--bg-card);border:1px solid var(--border-light);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  cursor:pointer;
  transition:transform .4s ease,box-shadow .4s ease,border-color .4s ease;
}
.home-card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 20px rgba(136,65,214,.2);
  border-color:var(--border);
}
.home-card svg{width:64px;height:64px;stroke:#fff;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;fill:none}
.home-card h2{font-size:36px;font-weight:400}
.home-iframe-wrap{display:none;flex:1;width:100%;overflow:hidden;min-height:0}
.home-iframe-wrap iframe{width:100%;height:100%;border:0}
#page-home.browsing .home-hero{display:none}
#page-home.browsing .home-cards{display:none}
#page-home.browsing .home-iframe-wrap{display:flex;animation:fadeIn .35s ease}

/* ══ GAMES / APPS ══ */
#page-games,#page-apps{padding:10px 16px;gap:12px}
.games-grid,.apps-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;padding-bottom:20px;
}
.game-tile,.app-tile{
  aspect-ratio:1;border-radius:14px;overflow:hidden;cursor:pointer;
  position:relative;background:#1a1024;
  transition:transform .4s ease,box-shadow .4s ease,filter .4s ease;
}
.game-tile:hover,.app-tile:hover{
  transform:translateY(-6px) scale(1.03);
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  filter:brightness(1.1);
}
.game-tile img,.app-tile img{width:100%;height:100%;object-fit:cover;display:block}
.game-tile .tile-label,.app-tile .tile-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:8px 10px;font-size:12px;font-weight:500;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  opacity:.9;transition:opacity .35s ease,font-size .35s ease,padding .35s ease,text-shadow .35s ease;
}
.game-tile:hover .tile-label,.app-tile:hover .tile-label{
  opacity:1;font-size:13.5px;padding:10px 10px;
  text-shadow:0 2px 8px rgba(0,0,0,.7);
}
.game-tile .tile-shadow,.app-tile .tile-shadow{
  position:absolute;bottom:0;left:0;right:0;height:40%;
  background:linear-gradient(transparent,rgba(0,0,0,.6));
  pointer-events:none;z-index:1;
  transition:height .4s ease,opacity .4s ease;
}
.game-tile:hover .tile-shadow,.app-tile:hover .tile-shadow{
  height:60%;background:linear-gradient(transparent,rgba(0,0,0,.8));
}
.tile-label .hl{color:#b07aff;font-weight:700}

.collections-list{
  display:flex;flex-direction:column;align-items:center;
  gap:18px;padding:10px 16px 30px;
}
.collection-tile{
  max-width:600px;width:100%;border-radius:14px;overflow:hidden;cursor:pointer;
  position:relative;background:#1a1024;
  transition:transform .4s ease,box-shadow .4s ease;
}
.collection-tile:hover{
  transform:translateY(-4px);
  box-shadow:0 8px 28px rgba(0,0,0,.5);
}
.collection-tile img{
  width:100%;height:auto;display:block;
  transition:transform .5s ease;
}
.collection-tile:hover img{transform:scale(1.04)}
.collection-tile .tile-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:10px 14px;font-size:14px;font-weight:500;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
  transition:opacity .35s ease;
}

.games-empty{text-align:center;padding:60px 20px;opacity:.5;font-size:18px}

/* ══ INNER PAGE IFRAME (apps/unblocks) ══ */
.page-iframe-wrap{
  display:none;flex:1;width:100%;overflow:hidden;min-height:0;
}
.page-iframe-wrap iframe{width:100%;height:100%;border:0}
#page-apps.browsing .apps-grid{display:none}
#page-apps.browsing .page-iframe-wrap{display:flex;animation:fadeIn .35s ease}
#page-unblocks.browsing #unblocks-container{display:none}
#page-unblocks.browsing .page-iframe-wrap{display:flex;animation:fadeIn .35s ease}

/* ══ OVERLAY ══ */
#game-overlay{
  display:none;position:absolute;inset:0;z-index:800;
  background:var(--bg-deep);
}
#game-overlay.active{display:flex}
#game-overlay iframe{flex:1;border:0;min-width:0;min-height:0}

#game-toolbar{
  display:flex;align-items:stretch;gap:0;
  background:rgba(14,5,20,.92);
  backdrop-filter:blur(12px);
  border:0;flex-shrink:0;
  z-index:801;
  transition:width .3s ease,height .3s ease;
}
#game-toolbar button{
  border:0;background:0;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:rgba(255,255,255,.55);
  transition:color .25s,background .25s,transform .25s;
  padding:4px 0;flex-shrink:0;
}
#game-toolbar button span{
  font-size:9px;font-weight:600;letter-spacing:.02em;
  opacity:0;max-height:0;overflow:hidden;
  transition:opacity .25s ease,max-height .25s ease;
  white-space:nowrap;line-height:1;
}
#game-toolbar.expanded button span{opacity:1;max-height:16px}
#game-toolbar button:hover{color:#fff;background:rgba(255,255,255,.08)}
#game-toolbar button.active-fav{color:#fbbf24}
#game-toolbar .tb-expand{position:relative;z-index:2}
#game-toolbar .tb-btns{display:flex;gap:0;overflow:hidden;transition:max-width .3s ease,max-height .3s ease,opacity .25s ease}

/* Left (default) */
#game-overlay[data-pos="left"]{flex-direction:row}
#game-overlay[data-pos="left"] #game-toolbar{
  flex-direction:column;width:38px;
  border-right:1px solid rgba(255,255,255,.08);
}
#game-overlay[data-pos="left"] #game-toolbar.expanded{width:72px}
#game-overlay[data-pos="left"] #game-toolbar button{width:100%;min-height:38px;border-radius:6px}
#game-overlay[data-pos="left"] #game-toolbar button svg{width:18px;height:18px;flex-shrink:0}
#game-overlay[data-pos="left"] #game-toolbar .tb-btns{flex-direction:column;max-height:0;opacity:0}
#game-overlay[data-pos="left"] #game-toolbar.expanded .tb-btns{max-height:500px;opacity:1}

/* Right */
#game-overlay[data-pos="right"]{flex-direction:row-reverse}
#game-overlay[data-pos="right"] #game-toolbar{
  flex-direction:column;width:38px;
  border-left:1px solid rgba(255,255,255,.08);
}
#game-overlay[data-pos="right"] #game-toolbar.expanded{width:72px}
#game-overlay[data-pos="right"] #game-toolbar button{width:100%;min-height:38px;border-radius:6px}
#game-overlay[data-pos="right"] #game-toolbar button svg{width:18px;height:18px;flex-shrink:0}
#game-overlay[data-pos="right"] #game-toolbar .tb-btns{flex-direction:column;max-height:0;opacity:0}
#game-overlay[data-pos="right"] #game-toolbar.expanded .tb-btns{max-height:500px;opacity:1}

/* Top */
#game-overlay[data-pos="top"]{flex-direction:column}
#game-overlay[data-pos="top"] #game-toolbar{
  flex-direction:row;height:38px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
#game-overlay[data-pos="top"] #game-toolbar.expanded{height:56px}
#game-overlay[data-pos="top"] #game-toolbar button{height:100%;min-width:56px;border-radius:6px}
#game-overlay[data-pos="top"] #game-toolbar button svg{width:18px;height:18px;flex-shrink:0}
#game-overlay[data-pos="top"] #game-toolbar .tb-btns{flex-direction:row;max-width:0;opacity:0}
#game-overlay[data-pos="top"] #game-toolbar.expanded .tb-btns{max-width:600px;opacity:1}

/* Bottom */
#game-overlay[data-pos="bottom"]{flex-direction:column-reverse}
#game-overlay[data-pos="bottom"] #game-toolbar{
  flex-direction:row;height:38px;
  border-top:1px solid rgba(255,255,255,.08);
}
#game-overlay[data-pos="bottom"] #game-toolbar.expanded{height:56px}
#game-overlay[data-pos="bottom"] #game-toolbar button{height:100%;min-width:56px;border-radius:6px}
#game-overlay[data-pos="bottom"] #game-toolbar button svg{width:18px;height:18px;flex-shrink:0}
#game-overlay[data-pos="bottom"] #game-toolbar .tb-btns{flex-direction:row;max-width:0;opacity:0}
#game-overlay[data-pos="bottom"] #game-toolbar.expanded .tb-btns{max-width:600px;opacity:1}

/* ══ AC MODAL ══ */
#ac-modal{
  display:none;position:fixed;inset:0;z-index:900;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
#ac-modal.open{display:flex}
#ac-modal .ac-panel{
  background:rgba(14,5,20,.95);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);border-radius:16px;
  padding:20px;width:360px;max-width:calc(100vw - 40px);
  max-height:80vh;overflow-y:auto;
  display:flex;flex-direction:column;gap:12px;
  color:var(--text);font-size:13px;
}
#ac-modal .ac-header{display:flex;justify-content:space-between;align-items:center}
#ac-modal .ac-title{font-size:15px;font-weight:600}
#ac-modal .ac-close{background:0;border:0;color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px}
#ac-modal .ac-close:hover{color:#fff;background:rgba(255,255,255,.08)}
#ac-modal .ac-status{font-size:12px;padding:4px 10px;border-radius:6px;display:inline-block}
#ac-modal .ac-status.off{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
#ac-modal .ac-status.on{background:rgba(34,197,94,.12);color:#4ade80}
#ac-modal label{font-size:12px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
#ac-modal input[type="number"],#ac-modal select{
  background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;padding:6px 10px;color:var(--text);font-size:13px;width:100%;
  font-family:inherit;
}
#ac-modal input[type="range"]{width:100%;accent-color:var(--accent-purple)}
#ac-modal .ac-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
#ac-modal .ac-row span{font-size:12px;opacity:.6;min-width:36px;text-align:right}
#ac-modal .ac-section{border-top:1px solid rgba(255,255,255,.06);padding-top:10px;margin-top:2px}
#ac-modal .ac-keybtn{
  padding:4px 12px;border:1px solid rgba(255,255,255,.1);border-radius:6px;
  background:rgba(255,255,255,.04);color:var(--text);font-size:12px;cursor:pointer;
  transition:border-color .2s;min-width:70px;text-align:center;
}
#ac-modal .ac-keybtn:hover{border-color:var(--accent-purple)}
#ac-modal .ac-keybtn.recording{border-color:#fbbf24;color:#fbbf24;animation:pulse 1s infinite}
#ac-modal .ac-actions{display:flex;gap:8px;margin-top:4px}
#ac-modal .ac-actions button{
  flex:1;padding:8px;border:0;border-radius:8px;font-weight:600;font-size:12px;
  cursor:pointer;font-family:inherit;transition:filter .2s,transform .15s;
}
#ac-modal .ac-actions button:hover{filter:brightness(1.15);transform:translateY(-1px)}
#ac-modal .ac-btn-save{background:linear-gradient(135deg,var(--accent-purple),#7c3aed);color:#fff}
#ac-modal .ac-btn-stop{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.08)}
#ac-modal #ac-enabled{width:18px;height:18px;accent-color:var(--accent-purple);cursor:pointer}

/* ══ UNBLOCKS / CONTACTS ══ */
#page-unblocks,#page-contacts{padding:10px 16px;gap:12px}
.section-title{font-size:14px;text-transform:uppercase;letter-spacing:2px;opacity:.5;padding:10px 0 4px}
.unblocks-grid,.contacts-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:14px;padding-bottom:10px;
}
.unblock-tile,.contact-tile{
  position:relative;
  height:120px;border-radius:14px;overflow:hidden;cursor:pointer;
  background:var(--bg-card);border:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;padding:16px;
  transition:transform .4s ease,border-color .4s ease,box-shadow .4s ease;
}
.unblock-tile:hover,.contact-tile:hover{
  transform:translateY(-5px);
  border-color:var(--border);
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.unblock-tile img,.contact-tile img{width:48px;height:48px;border-radius:10px;object-fit:cover}
.unblock-tile span,.contact-tile span{font-size:14px;font-weight:500;text-align:center}
.contact-tile .form-icon{
  width:48px;height:48px;stroke:var(--text);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;
}

/* ══ SETTINGS MODAL ══ */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .35s ease;
}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{
  width:90%;max-width:480px;max-height:80vh;
  background:var(--bg-deep);border:1px solid var(--border);
  border-radius:20px;padding:0;overflow:hidden;
  display:flex;flex-direction:column;
  transform:translateY(30px) scale(.96);
  transition:transform .45s cubic-bezier(.34,1.56,.64,1),opacity .35s ease;
  opacity:0;
}
.modal-overlay.open .modal{transform:translateY(0) scale(1);opacity:1}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--border-light);flex-shrink:0;
}
.modal-title{font-size:18px;font-weight:500}
.modal-close{
  width:32px;height:32px;border:0;background:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;color:var(--text);font-size:22px;
  transition:background .3s ease,transform .3s ease;
}
.modal-close:hover{background:rgba(255,255,255,.1);transform:rotate(90deg)}
.modal-body{
  padding:16px 22px 22px;overflow-y:auto;
  display:flex;flex-direction:column;gap:14px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;
}
.setting-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.setting-label{font-size:14px;opacity:.85;flex-shrink:0}
.setting-select{
  padding:8px 14px;cursor:pointer;
  background:rgba(255,255,255,.1);border:1px solid var(--border-light);
  border-radius:8px;color:#fff;font-family:inherit;font-size:13px;
  transition:border-color .3s ease;
}
.setting-select:hover{border-color:var(--border)}
.setting-input{
  flex:1;padding:8px 12px;
  background:rgba(255,255,255,.06);border:1px solid var(--border-light);
  border-radius:8px;color:#fff;font-family:inherit;font-size:13px;
  outline:0;min-width:0;
  transition:border-color .3s ease;
}
.setting-input:focus{border-color:var(--border)}
.setting-btn{
  padding:8px 16px;border:1px solid var(--border-light);border-radius:8px;
  background:rgba(255,255,255,.08);color:#fff;cursor:pointer;
  font-family:inherit;font-size:13px;
  transition:background .3s ease,border-color .3s ease;
}
.setting-btn:hover{background:rgba(255,255,255,.15);border-color:var(--border)}
.setting-divider{border:0;border-top:1px solid var(--border-light);margin:4px 0}
.setting-section-title{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;opacity:.5;margin-top:4px}
.cloak-icon-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0;
}
.cloak-icon-opt{
  width:100%;aspect-ratio:1;object-fit:contain;border-radius:8px;
  border:2px solid rgba(255,255,255,.1);cursor:pointer;
  background:rgba(255,255,255,.04);padding:6px;
  transition:border-color .3s ease,transform .2s ease,box-shadow .3s ease;
}
.cloak-icon-opt:hover{border-color:rgba(255,255,255,.3);transform:scale(1.05)}
.cloak-icon-opt.active{border-color:var(--accent-purple);box-shadow:0 0 12px rgba(168,85,247,.3)}
.cloak-upload-zone{
  grid-column:1/-1;border:2px dashed rgba(255,255,255,.15);border-radius:8px;
  padding:12px;text-align:center;cursor:pointer;font-size:12px;opacity:.6;
  transition:border-color .3s ease,opacity .3s ease;
}
.cloak-upload-zone:hover{border-color:rgba(255,255,255,.3);opacity:.85}
.cloak-sub-label{font-size:12px;opacity:.6;margin:10px 0 4px;display:block}
.toggle-switch{
  width:44px;height:24px;border-radius:12px;cursor:pointer;
  background:rgba(255,255,255,.15);position:relative;flex-shrink:0;
  transition:background .35s ease;
}
.toggle-switch::after{
  content:'';position:absolute;top:3px;left:3px;
  width:18px;height:18px;border-radius:50%;background:#fff;
  transition:transform .35s ease;
}
.toggle-switch.active{background:var(--accent-purple)}
.toggle-switch.active::after{transform:translateX(20px)}

/* ══ LOADING SKELETON ══ */
.skeleton{
  position:relative;overflow:hidden;
  background:rgba(255,255,255,.06);
  border-radius:14px;
}
.skeleton::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
  animation:shimmer 1.8s ease infinite;
}
.skeleton-tile{position:absolute;inset:0;z-index:0;border-radius:14px}
.skeleton-collection{max-width:600px;width:100%;height:160px;border-radius:14px}
.skeleton-unblock{height:120px;border-radius:14px}
.game-tile img,.app-tile img{position:relative;z-index:1}
.game-tile .tile-shadow,.app-tile .tile-shadow{z-index:2}
.game-tile .tile-label,.app-tile .tile-label,.collection-tile .tile-label{z-index:3}

/* ══ PARTICLE CANVAS ══ */
#particle-canvas{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;
}

/* ══ BACKGROUND EFFECTS (mouse-tracking blobs) ══ */
.bg-effects{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
.bg-effect{
  position:absolute;width:200px;height:200px;border-radius:50%;
  opacity:.15;filter:blur(35px);
  transition:transform 1s cubic-bezier(.23,1,.32,1);pointer-events:none;
}
.bg-effect-1{background:radial-gradient(circle,#0077FF 0%,rgba(0,119,255,0) 70%)}
.bg-effect-2{background:radial-gradient(circle,#3D88FF 0%,rgba(61,136,255,0) 70%)}
.bg-effect-3{background:radial-gradient(circle,#6A99FF 0%,rgba(106,153,255,0) 70%)}
.bg-effect-4{background:radial-gradient(circle,#88AAFF 0%,rgba(136,170,255,0) 70%)}
.bg-effect-5{background:radial-gradient(circle,#AA00FF 0%,rgba(170,0,255,0) 70%)}
.bg-effect-diamond{
  position:absolute;width:150px;height:150px;transform:rotate(45deg);
  opacity:.12;filter:blur(25px);
  transition:transform 1.2s cubic-bezier(.23,1,.32,1);pointer-events:none;
  border-radius:20%;
}
.bg-effect-diamond-1{background:linear-gradient(135deg,#0077FF,rgba(0,119,255,.3))}
.bg-effect-diamond-2{background:linear-gradient(135deg,#4D88FF,rgba(77,136,255,.3))}
.bg-effect-diamond-3{background:linear-gradient(135deg,#7D99FF,rgba(125,153,255,.3))}
.bg-effect-diamond-4{background:linear-gradient(135deg,#AA00FF,rgba(170,0,255,.3))}

/* ══ KEYFRAME ANIMATIONS ══ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInPage{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes tileIn{
  from{opacity:0;transform:translateY(18px) scale(.92)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes tileSlideLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes tileSlideRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes tileFadeScale{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes tileFlipIn{from{opacity:0;transform:perspective(400px) rotateY(-15deg) scale(.9)}to{opacity:1;transform:perspective(400px) rotateY(0) scale(1)}}
@keyframes tileDropBounce{0%{opacity:0;transform:translateY(-30px) scale(.95)}60%{opacity:1;transform:translateY(6px) scale(1.02)}100%{transform:translateY(0) scale(1)}}
@keyframes tileZoomSpin{from{opacity:0;transform:scale(.5) rotate(-8deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes tileSwingIn{0%{opacity:0;transform:rotate(-6deg) translateY(12px)}60%{transform:rotate(2deg) translateY(-2px)}100%{opacity:1;transform:rotate(0) translateY(0)}}
@keyframes tileElastic{0%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.08)}75%{transform:scale(.95)}100%{transform:scale(1)}}
@keyframes tileBlurIn{from{opacity:0;filter:blur(8px);transform:scale(1.05)}to{opacity:1;filter:blur(0);transform:scale(1)}}
@keyframes tileRollIn{from{opacity:0;transform:translateX(-20px) rotate(-12deg)}to{opacity:1;transform:translateX(0) rotate(0)}}
.tile-stagger{
  opacity:0;
  animation-duration:.4s;
  animation-timing-function:cubic-bezier(.25,.46,.45,.94);
  animation-fill-mode:forwards;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ══ SEARCH BAR MORPH TRANSITION ══ */
.search-morph{
  position:fixed;z-index:9999;pointer-events:none;
  border-radius:19px;
  background:var(--pill-bg);
  border:1.5px solid transparent;
  display:flex;align-items:center;padding:0 16px;gap:10px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  transition:top .4s cubic-bezier(.4,0,.2,1),
             left .4s cubic-bezier(.4,0,.2,1),
             width .4s cubic-bezier(.4,0,.2,1),
             opacity .25s ease;
}
.search-morph svg{
  width:18px;height:18px;stroke:var(--text-dim);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;flex-shrink:0;
}
.search-morph span{
  color:var(--text-dim);font-family:inherit;font-size:14px;
  white-space:nowrap;overflow:hidden;
}

/* ══ RESPONSIVE ══ */
@media(max-width:700px){
  .top-bar{padding:0 10px;height:48px;min-height:48px}
  .sidebar{width:44px;min-width:44px;padding:8px 0 10px}
  .sidebar .logo{width:28px;height:38px}
  .sidebar nav button{width:32px;height:32px}
  .sidebar nav button svg{width:16px;height:16px}
  .home-hero h1{font-size:32px}
  .home-search-bar{height:48px}
  .home-search-bar input{font-size:16px}
  .home-cards{flex-direction:column;align-items:center}
  .home-card{width:100%;max-width:320px;height:140px}
  .home-card h2{font-size:28px}
  .games-grid,.apps-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .dropdown-btn{min-width:140px;font-size:14px}
  .collections-list .collection-tile{max-width:100%}
}

/* ══ ENHANCED UI TRANSITIONS & ANIMATIONS ══ */

/* --- Text Inputs (url-bar, search-bar, home-search-bar, setting-input, ac-modal inputs) --- */
.url-bar input,.search-bar input,.home-search-bar input{
  transition:color .3s ease,letter-spacing .4s ease;
}
.url-bar input:focus,.search-bar input:focus,.home-search-bar input:focus{
  letter-spacing:.02em;
}
.url-bar input::placeholder,.search-bar input::placeholder,.home-search-bar input::placeholder{
  transition:opacity .4s ease,transform .4s ease;
}
.url-bar input:focus::placeholder,.search-bar input:focus::placeholder,.home-search-bar input:focus::placeholder{
  opacity:.3;transform:translateX(6px);
}
.url-bar svg,.search-bar svg,.home-search-bar svg{
  transition:stroke .35s ease,transform .4s ease,opacity .35s ease;
}
.url-bar:focus-within svg,.search-bar:focus-within svg,.home-search-bar:focus-within svg{
  stroke:#fff;transform:scale(1.1);opacity:1;
}

.setting-input{
  transition:border-color .3s ease,background .3s ease,box-shadow .35s ease;
}
.setting-input:focus{
  border-color:var(--accent-purple);
  background:rgba(255,255,255,.08);
  box-shadow:0 0 0 3px rgba(136,65,214,.15);
}
.setting-input:hover:not(:focus){
  border-color:rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);
}

#ac-modal input[type="number"],#ac-modal select{
  transition:border-color .25s ease,background .25s ease,box-shadow .3s ease;
}
#ac-modal input[type="number"]:focus,#ac-modal select:focus{
  border-color:var(--accent-purple);
  background:rgba(0,0,0,.45);
  box-shadow:0 0 0 3px rgba(136,65,214,.12);
  outline:none;
}
#ac-modal input[type="number"]:hover:not(:focus),#ac-modal select:hover:not(:focus){
  border-color:rgba(255,255,255,.15);
}

/* --- Select Dropdowns (setting-select) --- */
.setting-select{
  transition:border-color .3s ease,background .3s ease,box-shadow .35s ease,transform .2s ease;
  cursor:pointer;
}
.setting-select:focus{
  border-color:var(--accent-purple);
  background:rgba(255,255,255,.12);
  box-shadow:0 0 0 3px rgba(136,65,214,.15);
  outline:none;
}
.setting-select:hover:not(:focus){
  border-color:rgba(255,255,255,.25);
  background:rgba(255,255,255,.12);
}
.setting-select:active{transform:scale(.98)}

/* --- Toggle Switches --- */
.toggle-switch{
  transition:background .35s ease,box-shadow .35s ease,transform .2s ease;
}
.toggle-switch:hover{
  box-shadow:0 0 0 4px rgba(255,255,255,.06);
}
.toggle-switch:active{transform:scale(.92)}
.toggle-switch::after{
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s ease;
}
.toggle-switch.active::after{
  box-shadow:0 0 8px rgba(136,65,214,.5);
}

/* --- Buttons (setting-btn, ac action buttons, keybtn) --- */
.setting-btn{
  transition:background .3s ease,border-color .3s ease,transform .2s ease,box-shadow .3s ease;
}
.setting-btn:hover{
  background:rgba(255,255,255,.15);
  border-color:var(--border);
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.setting-btn:active{transform:scale(.95)}

#ac-modal .ac-actions button{
  transition:filter .2s ease,transform .2s ease,box-shadow .25s ease;
}
#ac-modal .ac-actions button:hover{
  filter:brightness(1.15);
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(0,0,0,.35);
}
#ac-modal .ac-actions button:active{transform:translateY(0) scale(.97);box-shadow:none}

#ac-modal .ac-keybtn{
  transition:border-color .2s ease,background .2s ease,transform .15s ease,box-shadow .25s ease;
}
#ac-modal .ac-keybtn:hover{
  border-color:var(--accent-purple);
  background:rgba(136,65,214,.08);
  box-shadow:0 0 0 3px rgba(136,65,214,.1);
}
#ac-modal .ac-keybtn:active{transform:scale(.94)}

#ac-modal .ac-close{
  transition:color .2s ease,background .2s ease,transform .2s ease;
}
#ac-modal .ac-close:hover{color:#fff;background:rgba(255,255,255,.08);transform:rotate(90deg)}

/* --- Search Filter Button & Menu --- */
.search-filter-btn{
  transition:background .25s ease,color .25s ease,transform .2s ease;
}
.search-filter-btn:active{transform:scale(.88)}
.filter-check-row{
  transition:background .2s ease,color .2s ease,padding-left .25s ease;
}
.filter-check-row:hover{padding-left:20px}

/* --- Modal Overlay & Panel --- */
.modal-overlay{transition:opacity .35s ease,backdrop-filter .35s ease}
.modal{
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .35s ease;
}
.modal-close{
  transition:background .3s ease,transform .35s cubic-bezier(.34,1.56,.64,1),color .3s ease;
}
.modal-close:hover{background:rgba(255,255,255,.1);transform:rotate(90deg);color:#fff}
.modal-close:active{transform:rotate(90deg) scale(.85)}

/* --- Checkbox (ac-drag-enabled) enhanced as toggle --- */
input[type="checkbox"]{
  appearance:none;-webkit-appearance:none;
  width:40px;height:22px;border-radius:11px;cursor:pointer;
  background:rgba(255,255,255,.15);position:relative;flex-shrink:0;
  transition:background .35s ease,box-shadow .35s ease;
  border:none;outline:none;
}
input[type="checkbox"]::after{
  content:'';position:absolute;top:3px;left:3px;
  width:16px;height:16px;border-radius:50%;background:#fff;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s ease;
}
input[type="checkbox"]:checked{background:var(--accent-purple)}
input[type="checkbox"]:checked::after{
  transform:translateX(18px);
  box-shadow:0 0 8px rgba(136,65,214,.5);
}
input[type="checkbox"]:hover{box-shadow:0 0 0 4px rgba(255,255,255,.06)}
input[type="checkbox"]:active{transform:scale(.92)}

/* --- Range inputs --- */
input[type="range"]{
  -webkit-appearance:none;appearance:none;
  height:6px;border-radius:3px;background:rgba(255,255,255,.12);
  outline:none;cursor:pointer;
  transition:background .3s ease;
}
input[type="range"]:hover{background:rgba(255,255,255,.18)}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;border-radius:50%;
  background:var(--accent-purple);border:2px solid #fff;
  cursor:pointer;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .3s ease;
  box-shadow:0 0 0 0 rgba(136,65,214,0);
}
input[type="range"]:hover::-webkit-slider-thumb{
  transform:scale(1.2);
  box-shadow:0 0 0 6px rgba(136,65,214,.2);
}
input[type="range"]:active::-webkit-slider-thumb{transform:scale(1.05)}

/* --- Cloak upload zone --- */

}
.cloak-upload-zone:hover{

/* --- Auth message animation --- */
.auth-msg{
  overflow:hidden;max-height:0;opacity:0;
  padding:0 14px;margin:0;border-radius:10px;
  font-size:13px;font-weight:500;
  transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .35s ease,padding .35s ease,margin .35s ease,transform .35s cubic-bezier(.34,1.56,.64,1);
  transform:translateY(-6px) scale(.96);
}

}
.auth-msg.success{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25)}
.auth-msg.error{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
@keyframes authShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* --- Game toolbar: expand glow, button icon spin hint --- */
@keyframes toolbarSlideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes toolbarBounceIn{0%{opacity:0;transform:translateX(30px)}65%{opacity:1;transform:translateX(-4px)}100%{transform:translateX(0)}}
@keyframes toolbarExpandPulse{0%,100%{box-shadow:-2px 0 20px rgba(0,0,0,.4)}50%{box-shadow:-2px 0 30px rgba(136,65,214,.3)}}
@keyframes toolbarBtnSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes toolbarBtnBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes toolbarBtnRipple{0%{box-shadow:0 0 0 0 rgba(255,255,255,.15)}100%{box-shadow:0 0 0 8px rgba(255,255,255,0)}}

#game-toolbar{transition:width .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s ease}
#game-toolbar.expanded{box-shadow:-2px 0 20px rgba(0,0,0,.4);animation:toolbarExpandPulse 2s ease infinite}
#game-toolbar button:hover{
  background:rgba(255,255,255,.1);
  box-shadow:0 0 8px rgba(255,255,255,.05);
  animation:toolbarBtnBounce .4s ease;
}
#game-toolbar button:active{animation:toolbarBtnPop .2s ease}

/* --- Page transition: smooth content entrance --- */
@keyframes pageSlideIn{0%{opacity:0;transform:translateX(12px)}100%{opacity:1;transform:translateX(0)}}
@keyframes pageFadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageFadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageZoomIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes pageSlideLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pageSlideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

@keyframes pageBlurIn{from{opacity:0;filter:blur(6px)}to{opacity:1;filter:blur(0)}}
@keyframes pageBounceIn{0%{opacity:0;transform:scale(.85)}60%{opacity:1;transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes pageRotateIn{from{opacity:0;transform:rotate(-2deg) scale(.95)}to{opacity:1;transform:rotate(0) scale(1)}}
@keyframes pageExpandIn{from{opacity:0;transform:scaleY(.9) translateY(10px)}to{opacity:1;transform:scaleY(1) translateY(0)}}
.page.active{animation-duration:.35s;animation-timing-function:ease;animation-fill-mode:both}

/* --- Setting rows: subtle slide in on hover --- */
@keyframes settingRowSlideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes settingRowFadeIn{from{opacity:0}to{opacity:1}}
@keyframes settingRowHighlight{0%{background:rgba(136,65,214,0)}50%{background:rgba(136,65,214,.06)}100%{background:rgba(136,65,214,0)}}

@keyframes toggleRipple{0%{box-shadow:0 0 0 0 rgba(136,65,214,.3)}100%{box-shadow:0 0 0 8px rgba(136,65,214,0)}}
@keyframes toggleGlow{0%,100%{box-shadow:0 0 4px rgba(136,65,214,.2)}50%{box-shadow:0 0 12px rgba(136,65,214,.4)}}

@keyframes keyBtnPop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes settingDividerGrow{from{width:0}to{width:100%}}
.setting-row:hover{transform:translateX(2px);animation:settingRowHighlight .6s ease}
.setting-row{transition:transform .2s ease,background .3s ease}
.toggle-switch:active,.filter-toggle:active{animation:toggleBounce .3s ease}
.toggle-switch.active{animation:toggleRipple .4s ease}

.setting-section-title::after{
  content:'';position:absolute;bottom:-2px;left:0;width:0;height:1.5px;

}

.keybtn:active{animation:keyBtnPop .25s ease}

@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.3)}
  50%{box-shadow:0 0 0 8px rgba(251,191,36,0)}
}

function morphSearchBar(fromRect,toEl){
  var morph=document.createElement('div');
  morph.className='search-morph';
  morph.innerHTML='<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span></span>';
  morph.style.top=fromRect.top+'px';
  morph.style.left=fromRect.left+'px';
  morph.style.width=fromRect.width+'px';
  morph.style.height=fromRect.height+'px';
  morph.style.borderRadius=(fromRect.height/2)+'px';
  document.body.appendChild(morph);
  toEl.style.visibility='hidden';

  requestAnimationFrame(function(){requestAnimationFrame(function(){
    var toRect=toEl.getBoundingClientRect();
    morph.style.top=toRect.top+'px';
    morph.style.left=toRect.left+'px';
    morph.style.width=toRect.width+'px';
    var inp=toEl.querySelector('input');
    if(inp) morph.querySelector('span').textContent=inp.placeholder||'';
    setTimeout(function(){
      morph.style.opacity='0';
      morph.addEventListener('transitionend',function done(e){
        if(e.propertyName!=='opacity') return;
        morph.removeEventListener('transitionend',done);
        toEl.style.visibility='';
        morph.remove();
      });
      setTimeout(function(){
        toEl.style.visibility='';
        morph.remove();
      },300);
    },380);
  });});
}

function navigate(page){
  if(currentPage===page){
    if(page==='home') exitBrowsing();
    else exitPageBrowsing(page);
    closeGameOverlay();
    var el=document.getElementById('page-'+page);
    if(el) el.scrollTop=0;
    return;
  }
  var prevPage=currentPage;
  var homeBar=document.querySelector('.tb-home .url-bar');
  var gamesSearch=document.querySelector('.tb-games .search-bar');
  var appsSearch=document.querySelector('.tb-apps .search-bar');

  var savedRect=null;
  var morphTarget=null;
  var barMap={home:homeBar,games:gamesSearch,apps:appsSearch};
  var fromBar=barMap[prevPage];
  var toBar=barMap[page];
  if(fromBar&&toBar){
    savedRect=fromBar.getBoundingClientRect();
    morphTarget=toBar;
  }

  exitBrowsing();
  exitPageBrowsing('apps');
  exitPageBrowsing('unblocks');
  closeGameOverlay();

  currentPage=page;
  document.getElementById('app').setAttribute('data-page',page);
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');p.style.animationName=''});
  var activePage=document.getElementById('page-'+page);
  activePage.style.animationName=pickRandom(PAGE_ANIMS);
  activePage.classList.add('active');
  if(page==='home') randomizeHomeCards();
  var snavOrder=['home','games','apps','unblocks','contacts'];
  var fromIdx=snavOrder.indexOf(prevPage);
  var toIdx=snavOrder.indexOf(page);
  var goingDown=toIdx>fromIdx;
  var snavBtns=document.querySelectorAll('.sidebar nav button');
  var snavOutAnim=goingDown?pickRandom(SNAV_OUT_DOWN):pickRandom(SNAV_OUT_UP);
  var snavInAnim=goingDown?pickRandom(SNAV_IN_DOWN):pickRandom(SNAV_IN_UP);
  snavBtns.forEach(function(b){
    b.classList.remove('snav-out-down','snav-out-up','snav-in-down','snav-in-up');
    b.style.animationName='';
  });
  void document.body.offsetWidth;
  snavBtns.forEach(function(b){
    var isOld=b.dataset.nav===prevPage;
    var isNew=b.dataset.nav===page;
    b.classList.toggle('active',isNew);
    if(isOld){
      b.classList.add(goingDown?'snav-out-down':'snav-out-up');
      b.style.animationName=snavOutAnim;
    }else if(isNew){
      b.classList.add(goingDown?'snav-in-down':'snav-in-up');
      b.style.animationName=snavInAnim;
    }
  });
  setTimeout(function(){
    snavBtns.forEach(function(b){
      b.classList.remove('snav-out-down','snav-out-up','snav-in-down','snav-in-up');
      b.style.animationName='';
    });
  },400);
  updateUrl();

  if(savedRect&&morphTarget){
    morphSearchBar(savedRect,morphTarget);
  }

  animateTopBar(prevPage,page);
}

function animateTopBar(from,to){
  var navBtns=document.querySelectorAll('.tb-home .nav-btns button');
  var dropdown=document.querySelector('.tb-games .dropdown');
  var gameSearchBar=document.querySelector('.tb-games .search-bar');
  var appSearchBar=document.querySelector('.tb-apps .search-bar');
  var tbHome=document.querySelector('.tb-home');
  var tbGames=document.querySelector('.tb-games');
  var tbApps=document.querySelector('.tb-apps');
  var allAnimEls=[].concat(Array.from(navBtns));
  if(dropdown) allAnimEls.push(dropdown);
  if(gameSearchBar) allAnimEls.push(gameSearchBar);
  if(appSearchBar) allAnimEls.push(appSearchBar);
  var AC=['nav-flow-out-right','nav-flow-in-from-right','nav-flow-out-left','nav-flow-in-from-left','tb-item-in','tb-item-out'];

  allAnimEls.forEach(function(el){AC.forEach(function(c){el.classList.remove(c)});el.style.animationName=''});
  [tbHome,tbGames,tbApps].forEach(function(s){if(s)s.classList.remove('tb-exiting')});
  void document.body.offsetWidth;

  var hasBar={home:true,games:true,apps:true};
  var fromSection={home:tbHome,games:tbGames,apps:tbApps}[from];
  var outR=pickRandom(NAV_OUT_RIGHT),inR=pickRandom(NAV_IN_RIGHT);
  var outL=pickRandom(NAV_OUT_LEFT),inL=pickRandom(NAV_IN_LEFT);

  function exitSection(section,dur){
    if(!section) return;
    section.classList.add('tb-exiting');
    setTimeout(function(){section.classList.remove('tb-exiting')},dur);
  }
  function applyNavOut(cls,animName){navBtns.forEach(function(b){b.classList.add(cls);b.style.animationName=animName})}

  if(from==='home'&&to==='games'){
    exitSection(tbHome,350);
    applyNavOut('nav-flow-out-right',outR);
    if(dropdown) dropdown.classList.add('tb-item-in');
    if(gameSearchBar) gameSearchBar.classList.add('tb-item-in');

  }else if(from==='games'&&to==='home'){
    applyNavOut('nav-flow-in-from-right',inR);

  }else if(from==='home'&&to==='apps'){
    exitSection(tbHome,350);
    applyNavOut('nav-flow-out-left',outL);
    if(appSearchBar) appSearchBar.classList.add('tb-item-in');

  }else if(from==='apps'&&to==='home'){
    applyNavOut('nav-flow-in-from-left',inL);

  }else if(from==='games'&&to==='apps'){
    exitSection(tbGames,300);
    if(dropdown) dropdown.classList.add('tb-item-out');
    if(gameSearchBar) gameSearchBar.classList.add('tb-item-out');
    if(appSearchBar) appSearchBar.classList.add('tb-item-in');

  }else if(from==='apps'&&to==='games'){
    exitSection(tbApps,300);
    if(appSearchBar) appSearchBar.classList.add('tb-item-out');
    if(dropdown) dropdown.classList.add('tb-item-in');
    if(gameSearchBar) gameSearchBar.classList.add('tb-item-in');

  }else if(hasBar[from]&&!hasBar[to]){
    exitSection(fromSection,300);
    if(from==='home'){
      navBtns.forEach(function(b){b.classList.add('tb-item-out')});
    }else if(from==='games'){
      if(dropdown) dropdown.classList.add('tb-item-out');
      if(gameSearchBar) gameSearchBar.classList.add('tb-item-out');
    }else if(from==='apps'){
      if(appSearchBar) appSearchBar.classList.add('tb-item-out');
    }

  }else if(!hasBar[from]&&hasBar[to]){
    if(to==='home'){
      applyNavOut('nav-flow-in-from-left',inL);
    }else if(to==='games'){
      if(dropdown) dropdown.classList.add('tb-item-in');
      if(gameSearchBar) gameSearchBar.classList.add('tb-item-in');
    }else if(to==='apps'){
      if(appSearchBar) appSearchBar.classList.add('tb-item-in');
    }
  }
}

  closeGameOverlay();
  var searchId=tab+'-search';

  if(tab==='games') renderGames();
  else if(tab==='apps') renderApps();

var HASH_MAP={home:'h',games:'g',apps:'a',unblocks:'u',contacts:'c'};
var HASH_REV={h:'home',g:'games',a:'apps',u:'unblocks',c:'contacts'};

function updateUrl(){
  var h=HASH_MAP[currentPage]||'h';
  window.history.replaceState(null,'','#'+h);
}

function restoreFromUrl(){
  var h=window.location.hash.slice(1);
  var tab=HASH_REV[h];
  if(!tab){updateUrl();return}
  if(tab!==currentPage) navigate(tab);
}

restoreFromUrl();
window.addEventListener('hashchange',function(){restoreFromUrl()});

function isUrl(s){
  return /^https?:\/\//i.test(s)||/^[a-z0-9]+([\-\.]{1}[a-z0-9]+)*\.[a-z]{2,}/i.test(s);
}
function proxyNavigate(input){
  if(!input.trim()) return;
  var url;
  if(isUrl(input.trim())){
    url=input.trim();
    if(!/^https?:\/\//i.test(url)) url='https://'+url;
  }else{
    url='https://duckduckgo.com/?q='+encodeURIComponent(input.trim());
  }
  if(currentPage!=='home') navigate('home');
  var pUrl=proxyUrl(url);
  proxyHistory=proxyHistory.slice(0,proxyIndex+1);
  proxyHistory.push(pUrl);
  proxyIndex=proxyHistory.length-1;
  document.getElementById('proxy-frame').src=pUrl;
  document.getElementById('nav-url').value=input.trim();
  document.getElementById('page-home').classList.add('browsing');
}
function proxyBack(){
  if(proxyIndex<=0){exitBrowsing();return}
  proxyIndex--;
  document.getElementById('proxy-frame').src=proxyHistory[proxyIndex];
}
function proxyForward(){
  if(proxyIndex>=proxyHistory.length-1) return;
  proxyIndex++;
  document.getElementById('proxy-frame').src=proxyHistory[proxyIndex];
}
function proxyRefresh(){
  try{var f=document.getElementById('proxy-frame');f.src=f.src}catch(e){}
}
function exitBrowsing(){
  proxyHistory=[];proxyIndex=-1;
  document.getElementById('page-home').classList.remove('browsing');
  document.getElementById('proxy-frame').src='';
  document.getElementById('nav-url').value='';
  document.getElementById('home-search').value='';
}
function openInPage(page,url){
  var frame=document.getElementById(page+'-frame');
  if(!frame) return;
  frame.src=url;
  document.getElementById('page-'+page).classList.add('browsing');
}
function exitPageBrowsing(page){
  var el=document.getElementById('page-'+page);
  if(!el) return;
  el.classList.remove('browsing');
  var frame=document.getElementById(page+'-frame');
  if(frame) frame.src='';
}

function staggerTiles(container){
  var tiles=container.querySelectorAll('.game-tile,.app-tile,.collection-tile,.unblock-tile,.contact-tile');
  var anim=pickRandom(TILE_ANIMS);
  var delay=0;
  var step=30;
  var max=600;
  for(var i=0;i<tiles.length;i++){
    tiles[i].classList.add('tile-stagger');
    tiles[i].style.animationName=anim;
    tiles[i].style.animationDelay=Math.min(delay,max)+'ms';
    delay+=step;
  }
}

function highlightMatch(name,query){
  if(!query) return name;
  var lower=name.toLowerCase();
  var qi=0,result='';
  for(var i=0;i<name.length;i++){
    if(qi<query.length && lower[i]===query[qi]){
      result+='<span class="hl">'+name[i]+'</span>';
      qi++;
    }else{
      result+=name[i];
    }
  }
  return result;
}
function gameTileHTML(g,imgBase,query){
  var src=imgBase?imgBase:'/game-images/games/'+g.img+'.png';
  var escaped=g.url.replace(/'/g,"\\'");
  var onclick;
  if(g.wo){
    onclick="window.open('"+escaped+"','_blank')";
  }else{
    onclick="openGame('"+escaped+"')";
  }
  var label=(query&&query.length)?highlightMatch(g.n,query):_t(g.n);
  return '<div class="game-tile" onclick="'+onclick+'">'+
    '<div class="skeleton skeleton-tile"></div>'+
    '<img src="'+src+'" alt="" loading="lazy" onload="this.previousElementSibling.style.display=\'none\'" onerror="this.previousElementSibling.style.display=\'none\'">'+
    '<div class="tile-shadow"></div>'+
    '<div class="tile-label">'+label+'</div></div>';
}
function collectionTileHTML(g){
  var escaped=g.url.replace(/'/g,"\\'");
  return '<div class="collection-tile" onclick="openGame(\''+escaped+'\')">'+
    '<div class="skeleton skeleton-collection" style="position:absolute;inset:0;z-index:0"></div>'+
    '<img src="'+g.img+'" alt="" loading="lazy" onload="this.previousElementSibling.style.display=\'none\'" onerror="this.previousElementSibling.style.display=\'none\'">'+
    '<div class="tile-label">'+_t(g.n)+'</div></div>';
}

function buildIconGrid(currentVal,storageKey,gridId){
  var html='';
  for(var i=0;i<CLOAK_ICONS.length;i++){
    var ic=CLOAK_ICONS[i];
    var isActive=(currentVal===ic.src||currentVal==='https://jimmyqrg.github.io'+ic.src);
    html+='<img class="cloak-icon-opt'+(isActive?' active':'')+'" src="'+ic.src+'" title="'+ic.name+'" draggable="false" onclick="selectCloakIcon(this,\''+storageKey+'\',\''+gridId+'\',\''+ic.src+'\')">';
  }
  html+='<div class="cloak-upload-zone" onclick="this.querySelector(\'input\').click()">Custom Icon<input type="file" accept="image/*" style="display:none" onchange="uploadCloakIcon(this,\''+storageKey+'\',\''+gridId+'\')"></div>';
  return html;
}
function selectCloakIcon(el,key,gridId){
  var src=el.getAttribute('src');
  localStorage.setItem(key,src);
  var grid=document.getElementById(gridId);
  grid.querySelectorAll('.cloak-icon-opt').forEach(function(o){o.classList.remove('active')});
  el.classList.add('active');
}
function uploadCloakIcon(input,key,gridId){
  var file=input.files[0];
  if(!file||!file.type.startsWith('image/'))return;
  var reader=new FileReader();
  reader.onload=function(e){
    localStorage.setItem(key,e.target.result);
    var grid=document.getElementById(gridId);
    grid.querySelectorAll('.cloak-icon-opt').forEach(function(o){o.classList.remove('active')});
    var existing=grid.querySelector('.cloak-icon-custom');
    if(existing){existing.src=e.target.result;existing.classList.add('active')}
    else{var img=document.createElement('img');img.className='cloak-icon-opt cloak-icon-custom active';img.src=e.target.result;img.title='Custom';img.draggable=false;img.onclick=function(){selectCloakIcon(img,key,gridId)};grid.insertBefore(img,grid.querySelector('.cloak-upload-zone'))}
  };
  reader.readAsDataURL(file);
}

  el.classList.add('show');
  if(type==='error') el.classList.add('shake');

var acSettings={
  enabled:false,cps:10,offset:2,clickType:'single',clickBtn:0,
  toggleKey:'F6',stopKey:'Escape'
};
var acRunning=false;
var acIntervalId=null;
var acRecordingKey=null;
var acMouseHeld=false;
var acLastMousePos={x:0,y:0};

function loadACSettings(){
  try{var s=JSON.parse(localStorage.getItem('autoClickerSettings'));if(s)acSettings=Object.assign(acSettings,s)}catch(e){}
}
loadACSettings();

function saveACSettings(){
  acSettings.enabled=document.getElementById('ac-enabled').checked;
  acSettings.cps=parseFloat(document.getElementById('ac-cps').value)||10;
  acSettings.offset=parseFloat(document.getElementById('ac-offset').value)||0;
  acSettings.clickType=document.getElementById('ac-click-type').value;
  acSettings.clickBtn=parseInt(document.getElementById('ac-click-btn').value);
  acSettings.toggleKey=document.getElementById('ac-key-toggle').textContent;
  acSettings.stopKey=document.getElementById('ac-key-stop').textContent;
  localStorage.setItem('autoClickerSettings',JSON.stringify(acSettings));
}

function cancelACSettings(){
  closeAutoClicker();
}

function openAutoClicker(){
  var m=document.getElementById('ac-modal');
  document.getElementById('ac-enabled').checked=acSettings.enabled;
  document.getElementById('ac-cps').value=acSettings.cps;
  document.getElementById('ac-offset').value=acSettings.offset;
  document.getElementById('ac-offset-val').textContent=acSettings.offset;
  document.getElementById('ac-click-type').value=acSettings.clickType;
  document.getElementById('ac-click-btn').value=acSettings.clickBtn;
  document.getElementById('ac-key-toggle').textContent=acSettings.toggleKey;
  document.getElementById('ac-key-stop').textContent=acSettings.stopKey;
  updateACStatus();
  m.classList.add('open');
}
function closeAutoClicker(){
  document.getElementById('ac-modal').classList.remove('open');
  acRecordingKey=null;
  document.querySelectorAll('.ac-keybtn.recording').forEach(function(b){b.classList.remove('recording')});
}

function updateACStatus(){
  var badge=document.getElementById('ac-status-badge');
  if(acRunning){badge.textContent='Active';badge.className='ac-status on'}
  else{badge.textContent='Inactive';badge.className='ac-status off'}
}

document.getElementById('ac-offset').addEventListener('input',function(){document.getElementById('ac-offset-val').textContent=this.value});

function recordACKey(which){
  acRecordingKey=which;
  var btn=document.getElementById('ac-key-'+which);
  btn.classList.add('recording');
  btn.textContent='Press...';
}

document.addEventListener('keydown',function(e){
  if(!acRecordingKey) return;
  e.preventDefault();
  var key=e.code;
  var btn=document.getElementById('ac-key-'+acRecordingKey);
  btn.textContent=key;
  btn.classList.remove('recording');
  acRecordingKey=null;
});

function doACClick(cx,cy){
  var frame=_goFrame;
  if(!frame) return;
  try{
    var doc=frame.contentDocument||frame.contentWindow.document;
    var el=doc.elementFromPoint(cx,cy)||doc.body;
    var btn=acSettings.clickBtn;
    var opts={bubbles:true,cancelable:true,clientX:cx,clientY:cy,button:btn,view:frame.contentWindow};
    el.dispatchEvent(new MouseEvent('mouseup',opts));
    el.dispatchEvent(new MouseEvent('click',opts));
    if(acSettings.clickType==='double'){
      el.dispatchEvent(new MouseEvent('mousedown',opts));
      el.dispatchEvent(new MouseEvent('mouseup',opts));
      el.dispatchEvent(new MouseEvent('click',opts));
      el.dispatchEvent(new MouseEvent('dblclick',opts));
    }
    el.dispatchEvent(new MouseEvent('mousedown',opts));
  }catch(e){}
}

function startAutoClicker(){
  if(acRunning) return;
  acRunning=true;
  updateACStatus();
  scheduleACClick();
}
function scheduleACClick(){
  if(!acRunning) return;
  var cps=acSettings.cps;
  var offset=acSettings.offset;
  var actual=cps+((Math.random()*2-1)*offset);
  if(actual<0.5)actual=0.5;
  acIntervalId=setTimeout(function(){
    if(!acRunning) return;
    if(acMouseHeld){
      doACClick(acLastMousePos.x,acLastMousePos.y);
    }
    scheduleACClick();
  },1000/actual);
}
function stopAutoClicker(){
  acRunning=false;
  if(acIntervalId){clearTimeout(acIntervalId);acIntervalId=null}
  updateACStatus();
}

document.addEventListener('keydown',function(e){
  if(acRecordingKey) return;
  if(!acSettings.enabled) return;
  if(!_goOverlay||!_goOverlay.classList.contains('active')) return;
  if(e.code===acSettings.toggleKey){
    if(acRunning) stopAutoClicker(); else startAutoClicker();
  }
  if(e.code===acSettings.stopKey && acRunning){
    stopAutoClicker();
  }
});

(function(){
  function trackMouse(e){
    acLastMousePos.x=e.clientX;
    acLastMousePos.y=e.clientY;
  }
  function onMouseDown(e){
    if(!acSettings.enabled||!acRunning) return;
    if(!_goOverlay||!_goOverlay.classList.contains('active')) return;
    acMouseHeld=true;
  }
  function onMouseUp(e){
    acMouseHeld=false;
  }
  document.addEventListener('mousemove',trackMouse);
  document.addEventListener('mousedown',onMouseDown);
  document.addEventListener('mouseup',onMouseUp);
  if(_goFrame){
    _goFrame.addEventListener('load',function(){
      try{
        var doc=_goFrame.contentDocument||_goFrame.contentWindow.document;
        doc.addEventListener('mousemove',function(e){
          var r=_goFrame.getBoundingClientRect();
          acLastMousePos.x=e.clientX;
          acLastMousePos.y=e.clientY;
        });
        doc.addEventListener('mousedown',function(){
          if(!acSettings.enabled||!acRunning) return;
          acMouseHeld=true;
        });
        doc.addEventListener('mouseup',function(){acMouseHeld=false});
      }catch(e){}
    });
  }
})();

// Glowing particles
(function(){
  var canvas=document.getElementById('particle-canvas');
  var ctx=canvas.getContext('2d');
  var mx=window.innerWidth/2,my=window.innerHeight/2;
  var particles=[];
  var PARTICLE_COUNT=60;
  var glowColors=[
    {r:168,g:85,b:247},
    {r:99,g:102,b:241},
    {r:236,g:72,b:153},
    {r:59,g:130,b:246},
    {r:170,g:0,b:255},
    {r:0,g:119,b:255}
  ];

  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
  resize();
  window.addEventListener('resize',resize);
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY});

  function Particle(){this.reset()}
  Particle.prototype.reset=function(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.size=Math.random()*2.5+0.5;
    this.speedX=(Math.random()-0.5)*0.3;
    this.speedY=(Math.random()-0.5)*0.3;
    var c=glowColors[Math.floor(Math.random()*glowColors.length)];
    this.r=c.r;this.g=c.g;this.b=c.b;
    this.alpha=Math.random()*0.5+0.15;
    this.life=Math.random()*300+200;
    this.maxLife=this.life;
    this.glowSize=this.size*(3+Math.random()*4);
  };
  Particle.prototype.update=function(){
    var dx=mx-this.x,dy=my-this.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<200){this.x+=dx*0.003;this.y+=dy*0.003}
    this.x+=this.speedX;this.y+=this.speedY;this.life--;
    if(this.life<=0||this.x<-10||this.x>canvas.width+10||this.y<-10||this.y>canvas.height+10)this.reset();
  };
  Particle.prototype.draw=function(){
    var f=this.life<50?this.life/50:1;
    var a=this.alpha*f;
    ctx.save();
    ctx.shadowColor='rgba('+this.r+','+this.g+','+this.b+','+a+')';
    ctx.shadowBlur=this.glowSize;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle='rgba('+this.r+','+this.g+','+this.b+','+a+')';
    ctx.fill();
    ctx.fill();
    ctx.restore();
  };

  for(var i=0;i<PARTICLE_COUNT;i++)particles.push(new Particle());
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(var i=0;i<particles.length;i++){particles[i].update();particles[i].draw()}
    requestAnimationFrame(animate);
  }
  animate();
})();

// Mouse-tracking background blobs (from gh-pages)
(function(){
  var container=document.querySelector('.bg-effects');
  if(!container)return;
  var effects=[];
  var numCircles=5,numDiamonds=4;
  var baseRadius=Math.min(window.innerWidth,window.innerHeight)*0.4;
  var currentBaseRadius=baseRadius;
  var mouseX=window.innerWidth/2,mouseY=window.innerHeight/2;

  for(var i=0;i<numCircles;i++){
    var el=document.createElement('div');
    el.className='bg-effect bg-effect-'+(i+1);
    container.appendChild(el);
    var off=i%2===0?50:-50;
    effects.push({el:el,angle:(i/numCircles)*Math.PI*2,baseOffset:off,isDiamond:false,towardMouse:i%2===0});
  }
  for(var i=0;i<numDiamonds;i++){
    var el=document.createElement('div');
    el.className='bg-effect-diamond bg-effect-diamond-'+(i+1);
    container.appendChild(el);
    var off=i%2===0?30:-30;
    effects.push({el:el,angle:(i/numDiamonds)*Math.PI*2+Math.PI/4,baseOffset:off,isDiamond:true,towardMouse:i%2!==0});
  }

  function updateEffects(){
    var cx=window.innerWidth/2,cy=window.innerHeight/2;
    var dx=mouseX-cx,dy=mouseY-cy;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var maxDist=Math.sqrt(cx*cx+cy*cy);
    var norm=dist/maxDist;
    var targetR=baseRadius*(1+(norm-0.5)*0.7);
    currentBaseRadius+=(targetR-currentBaseRadius)*0.08;
    var mouseAngle=Math.atan2(dy,dx);

    for(var i=0;i<effects.length;i++){
      var e=effects[i];
      var angle=e.angle;
      if(e.towardMouse){
        var d=mouseAngle-angle;
        while(d>Math.PI)d-=Math.PI*2;
        while(d<-Math.PI)d+=Math.PI*2;
        angle+=d*0.15;
      }else{
        var d=(mouseAngle+Math.PI)-angle;
        while(d>Math.PI)d-=Math.PI*2;
        while(d<-Math.PI)d+=Math.PI*2;
        angle+=d*0.12;
      }
      e.angle=angle;
      var r=e.isDiamond?currentBaseRadius*0.7+e.baseOffset:currentBaseRadius+e.baseOffset;
      var x=cx+Math.cos(angle)*r;
      var y=cy+Math.sin(angle)*r;
      var sz=e.isDiamond?75:100;
      e.el.style.left=(x-sz)+'px';
      e.el.style.top=(y-sz)+'px';
    }
  }

  document.addEventListener('mousemove',function(ev){mouseX=ev.clientX;mouseY=ev.clientY});
  window.addEventListener('resize',function(){
    baseRadius=Math.min(window.innerWidth,window.innerHeight)*0.4;
    currentBaseRadius=baseRadius;
  });

  (function loop(){updateEffects();requestAnimationFrame(loop)})();
})();
