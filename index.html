const PROXY_BASE = 'https://rammerhead.fly.dev/unblocker.html';
function proxyUrl(url, raw) {
  return PROXY_BASE + '?' + (raw ? 'raw=true&' : '') + 'url=' + encodeURIComponent(url);
}

/* ── Navigation ── */
let currentPage = 'home';
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.sidebar nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.nav === page);
  });
  window.history.replaceState(null, '', '#' + page);
}

window.addEventListener('hashchange', () => {
  const h = location.hash.slice(1);
  if (['home','games','apps','unblocks','contacts'].includes(h)) navigate(h);
});
if (location.hash) {
  const h = location.hash.slice(1);
  if (['home','games','apps','unblocks','contacts'].includes(h)) navigate(h);
}

/* ── Proxy / Home ── */
function isUrl(s) {
  return /^https?:\/\//i.test(s) || /^[a-z0-9]+([\-\.]{1}[a-z0-9]+)*\.[a-z]{2,}/i.test(s);
}
function proxyNavigate(input) {
  if (!input.trim()) return;
  let url;
  if (isUrl(input.trim())) {
    url = input.trim();
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  } else {
    url = 'https://duckduckgo.com/?q=' + encodeURIComponent(input.trim());
  }
  document.getElementById('proxy-frame').src = proxyUrl(url);
  document.getElementById('nav-url').value = input.trim();
  document.getElementById('page-home').classList.add('browsing');
  document.querySelector('.home-nav').style.display = '';
}
function proxyBack() { try { document.getElementById('proxy-frame').contentWindow.history.back(); } catch(e){} }
function proxyForward() { try { document.getElementById('proxy-frame').contentWindow.history.forward(); } catch(e){} }
function proxyRefresh() { try { var f = document.getElementById('proxy-frame'); f.src = f.src; } catch(e){} }

/* ══════════ RENDER ══════════ */

function gameTileHTML(g, imgBase) {
  var src = imgBase ? imgBase : '/game-images/games/' + g.img + '.png';
  var escaped = g.url.replace(/'/g, "\\'");
  return '<div class="game-tile" onclick="openGame(\'' + escaped + '\')">' +
    '<img src="' + src + '" alt="' + g.n + '" loading="lazy" onerror="this.style.display=\'none\'">' +
    '<div class="tile-label">' + g.n + '</div></div>';
}

var gameTab = 'all';
function renderGames() {
  var c = document.getElementById('games-container');
  var q = (document.getElementById('games-search').value || '').toLowerCase();
  var html = '';
  if (gameTab === 'all') {
    var filtered = GAMES.filter(function(g){ return g.n.toLowerCase().includes(q); });
    if (!filtered.length) html = '<div class="games-empty">No games found</div>';
    else filtered.forEach(function(g){ html += gameTileHTML(g); });
  } else if (gameTab === 'collections') {
    var filtered = COLLECTIONS.filter(function(g){ return g.n.toLowerCase().includes(q); });
    if (!filtered.length) html = '<div class="games-empty">No collections found</div>';
    else filtered.forEach(function(g){ html += gameTileHTML(g, g.img); });
  } else if (gameTab === 'pending') {
    var filtered = PENDING.filter(function(g){ return g.n.toLowerCase().includes(q); });
    if (!filtered.length) html = '<div class="games-empty">No pending games</div>';
    else filtered.forEach(function(g){ html += gameTileHTML(g); });
  }
  c.innerHTML = html;
}

function filterGames() { renderGames(); }

function setGameTab(tab) {
  gameTab = tab;
  var labels = {all:'All Games',collections:'Collections',pending:'Pending'};
  document.getElementById('dd-label').textContent = labels[tab];
  document.getElementById('games-dropdown').classList.remove('open');
  document.querySelectorAll('#games-dropdown .dropdown-menu button').forEach(function(b){ b.classList.remove('selected'); });
  if (event && event.target) event.target.classList.add('selected');
  renderGames();
}

function toggleDropdown() {
  document.getElementById('games-dropdown').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('#games-dropdown')) {
    document.getElementById('games-dropdown').classList.remove('open');
  }
});

function renderApps() {
  var c = document.getElementById('apps-container');
  var q = (document.getElementById('apps-search').value || '').toLowerCase();
  var filtered = APPS.filter(function(a){ return a.n.toLowerCase().includes(q); });
  var html = '';
  filtered.forEach(function(a) {
    var href, onclick;
    if (a.proxy) {
      href = proxyUrl('https://' + a.url, !!a.raw);
      onclick = "window.open('" + href.replace(/'/g, "\\'") + "','_blank')";
    } else {
      onclick = "window.open('" + a.url.replace(/'/g, "\\'") + "','_blank')";
    }
    html += '<div class="app-tile" onclick="' + onclick + '">' +
      '<img src="/game-images/apps/' + a.img + '.png" alt="' + a.n + '" loading="lazy" onerror="this.style.display=\'none\'">' +
      '<div class="tile-label">' + a.n + '</div></div>';
  });
  if (!filtered.length) html = '<div class="games-empty">No apps found</div>';
  c.innerHTML = html;
}
function filterApps() { renderApps(); }

function renderUnblocks() {
  var c = document.getElementById('unblocks-container');
  var html = '<div class="section-title">Proxies &amp; Tools</div><div class="unblocks-grid">';
  UNBLOCKS.forEach(function(u) {
    var target = u.url.startsWith('http') ? '_blank' : '_self';
    html += '<div class="unblock-tile" onclick="window.open(\'' + u.url + '\',\'' + target + '\')">' +
      '<img src="/game-images/unblocks/' + u.img + '.png" alt="' + u.n + '" loading="lazy" onerror="this.style.display=\'none\'">' +
      '<span>' + u.n + '</span></div>';
  });
  html += '</div>';
  c.innerHTML = html;
}

    dev:'<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>',

  c.innerHTML = html;
