  <!-- Ad/overlay suppression and error logging -->
  <script>
    // Hide common ad overlays and log errors
    function hideAdsAndOverlays() {
      // Hide elements with common ad/overlay ids/classes
      const selectors = [
        '[id*="ad"]', '[class*="ad"]', '[id*="overlay"]', '[class*="overlay"]', '[id*="rewarded"]', '[class*="rewarded"]', '[id*="midgame"]', '[class*="midgame"]', '[id*="pause"]', '[class*="pause"]'
      ];
      selectors.forEach(sel => {
        document.querySelectorAll(sel).forEach(el => {
          el.style.display = 'none';
        });
      });
    }
    // Observe DOM for overlays
    const observer = new MutationObserver(hideAdsAndOverlays);
    observer.observe(document.documentElement, {childList: true, subtree: true});
    window.addEventListener('DOMContentLoaded', hideAdsAndOverlays);
    window.addEventListener('load', hideAdsAndOverlays);
    // Patch ad-related APIs
    window.requestAnimationFrame = (function(orig){
      return function(cb){
        try { return orig(cb); } catch(e) { console.error(e); }
      }
    })(window.requestAnimationFrame);
    // Log errors for debugging
    window.addEventListener('error', function(e){
      console.error('Game error:', e.error || e.message || e);
    });
  </script>

      (function () {

          window.vConsole = new VConsole();
        }

        var debug = window._CCSettings.debug;
        var splash = document.getElementById('splash');
        splash.style.display = 'block';

        function loadScript(moduleName, cb) {
          function scriptLoaded() {
            document.body.removeChild(domScript);
            domScript.removeEventListener('load', scriptLoaded, false);
            cb && cb();
          };
          var domScript = document.createElement('script');
          domScript.async = true;
          domScript.src = moduleName;
          domScript.addEventListener('load', scriptLoaded, false);
          document.body.appendChild(domScript);
        }

        // Always load minified engine (debug version not present)
        loadScript('cocos2d-js-min.js', function () {
          if (typeof CC_PHYSICS_BUILTIN !== 'undefined' || typeof CC_PHYSICS_CANNON !== 'undefined') {
            loadScript('physics-min.js', window.boot);
          } else {
            window.boot();
          }
        });
      })();
    </script>
