<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights at Freddy's</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background-color: rgba(154, 0, 0, 0.9);
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 12px rgba(255, 0, 0, 0.15);
            text-align: center;
        }
        
        h1 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .subtitle {
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .version-selector {
            margin-bottom: 25px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            font-weight: bold;
        }
        
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ffffff;
            border-radius: 4px;
            font-size: 16px;
            background-color: rgb(255, 0, 0);
            cursor: pointer;
        }
        
        .launch-button {
            width: 100%;
            padding: 14px;
            background-color: #710000;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            cursor: not-allowed;
            transition: background-color 0.2s;
        }
        
        .launch-button.enabled {
            background-color: #ff0000;
            color: white;
            cursor: pointer;
        }
        
        .launch-button.enabled:hover {
            color: #ff0000;
            background-color: #ffffff;
        }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            min-height: 20px;
        }
        
        .status.waiting {
            color: #ffffff;
        }
        
        .status.ready {
            color: #ff7979;
            font-weight: bold;
        }
        
        #version-select {
            color: #ffffff;
        }

        footer {
            margin-top: 30px;
            color: #777;
            font-size: 12px;
        }
    </style>

<!-- JQRG_CLOUD_INJECT_BEGIN --><script src="/js/jqrg-cloud.js" defer></script><script src="/js/jqrg-auth-ui.js" defer></script><!-- JQRG_CLOUD_INJECT_END -->
</head>
<body>
    <div class="container">
        <h1>Five Nights at Freddy's</h1>
        
        <div class="version-selector">
            <label for="version-select">Choose Version:</label>
            <select id="version-select">
                <option value="" selected disabled>Choose Version</option>
                <option value="1/">Five Nights at Freddy's 1</option>
                <option value="2/">Five Nights at Freddy's 2</option>
                <option value="3/">Five Nights at Freddy's 3</option>
                <option value="4/">Five Nights at Freddy's 4</option>
                <option value="e1/">Five Nights at Epstein's 1</option>
                <option value="e2/">Five Nights at Epstein's 2</option>
            </select>
        </div>
        
        <button id="launch-btn" class="launch-button" disabled>LAUNCH</button>
        
        <div id="status" class="status waiting">Select a version</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const versionSelect = document.getElementById('version-select');
            const launchButton = document.getElementById('launch-btn');
            const statusDiv = document.getElementById('status');
            
            // Track selected URL
            let selectedUrl = '';
            
            // Handle version selection
            versionSelect.addEventListener('change', function() {
                if (this.value) {
                    // Enable launch button
                    launchButton.disabled = false;
                    launchButton.classList.add('enabled');
                    
                    // Update status
                    statusDiv.textContent = 'Ready to launch: ' + this.options[this.selectedIndex].text;
                    statusDiv.className = 'status ready';
                    
                    // Store selected URL
                    selectedUrl = this.value;
                } else {
                    // Disable launch button
                    launchButton.disabled = true;
                    launchButton.classList.remove('enabled');
                    
                    // Update status
                    statusDiv.textContent = 'Please select a version above';
                    statusDiv.className = 'status waiting';
                    
                    // Clear selected URL
                    selectedUrl = '';
                }
            });
            
            // Handle launch button click
            launchButton.addEventListener('click', function() {
                if (selectedUrl) {
                    // Update status
                    statusDiv.textContent = 'Launching... Redirecting now!';
                    
                    // Redirect to the selected URL after a brief delay
                    setTimeout(function() {
                        window.open(selectedUrl, "_self");
                    }, 800);
                }
            });
        });
    </script>
</body>
</html>
