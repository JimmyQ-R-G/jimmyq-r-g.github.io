<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JimmyQrg</title>
<link rel="icon" href="/jq.ico">
<link rel="manifest" href="/appmanifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="/js/mainPageCloak.js"></script>
<script src="/js/panicKey.js"></script>
<style>
/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ── Tokens ── */
:root{
  --bg-deep:#0e0514;
  --bg-card:rgba(0,0,0,0.3);
  --border:rgba(255,255,255,0.5);
  --border-light:rgba(255,255,255,0.15);
  --text:#fff;
  --text-dim:rgba(255,255,255,0.6);
  --pill-bg:rgba(255,255,255,0.1);
  --dropdown-bg:rgba(13,5,18,0.75);
  --search-pill-bg:rgba(14,5,20,0.75);
  --accent-purple:rgba(136,65,214,1);
  --sidebar-w:54px;
  --top-bar-h:54px;
  --radius:20px;
  --radius-sm:13px;
}

html,body{
  height:100%;overflow:hidden;
  font-family:'Oxanium',sans-serif;
  color:var(--text);background:#000;
}

/* ══ BACKGROUND ══ */
.bg{
  position:fixed;inset:0;z-index:0;
  background:conic-gradient(from 90deg,#342c8a,#211f39,#5b2d7d,#000,#352f72);
  filter:blur(32px);opacity:.7;
}
.bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.3),rgba(0,0,0,.6));
}

/* ══ SHELL (L-shaped frame) ══ */
#app{
  position:relative;z-index:1;
  width:100%;height:100%;
  display:flex;flex-direction:column;
}

.top-bar{
  height:var(--top-bar-h);min-height:var(--top-bar-h);
  background:var(--bg-deep);
  border:1.5px solid var(--border);
  border-bottom:none;
  border-radius:var(--radius) var(--radius) 0 0;
  display:flex;align-items:center;
  padding:0 16px;gap:12px;
  margin:8px 8px 0 8px;
}

.body-row{
  display:flex;flex:1;min-height:0;
  margin:0 8px 8px 8px;
}

/* ══ SIDEBAR ══ */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--bg-deep);
  border:1.5px solid var(--border);
  border-top:none;
  border-right:1.5px solid var(--border);
  border-radius:0 0 0 var(--radius);
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0 14px;gap:6px;
}

.sidebar .logo{
  width:34px;height:34px;cursor:pointer;margin-bottom:4px;flex-shrink:0;
  filter:drop-shadow(0 0 13px var(--accent-purple));
}
.sidebar .logo svg{width:100%;height:100%;display:block}

.sidebar .jq-mark{
  width:20px;height:24px;margin-bottom:6px;
  filter:drop-shadow(0 0 23px #fff);flex-shrink:0;
}
.sidebar .jq-mark svg{width:100%;height:100%;display:block}

.sidebar nav{
  display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;
}
.sidebar nav button{
  width:38px;height:38px;border:0;background:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;transition:background .2s;
}
.sidebar nav button:hover{background:rgba(255,255,255,.08)}
.sidebar nav button svg{
  width:20px;height:20px;stroke:var(--text);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;
  opacity:.55;transition:opacity .2s,filter .2s;
}
.sidebar nav button.active svg{
  opacity:1;
  filter:drop-shadow(0 0 6.75px #fff) drop-shadow(0 0 6.75px #fff);
}
.sidebar nav button[data-nav="games"] svg{fill:var(--text);stroke:none}
.sidebar nav button.active[data-nav="games"] svg{fill:var(--text);stroke:none}

/* ══ TOP BAR CONTENTS ══ */
.top-bar .brand{
  font-size:14px;font-weight:400;letter-spacing:.5px;
  white-space:nowrap;opacity:.85;flex-shrink:0;margin-right:4px;
}
.top-bar .settings-top{
  width:34px;height:34px;border:0;background:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;margin-left:auto;flex-shrink:0;
}
.top-bar .settings-top:hover{background:rgba(255,255,255,.08)}
.top-bar .settings-top svg{
  width:20px;height:20px;stroke:var(--text);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:.7;
}

/* ══ MAIN CONTENT AREA ══ */
.main{
  flex:1;display:flex;flex-direction:column;min-width:0;
  overflow:hidden;
  border-bottom:1.5px solid var(--border);
  border-right:1.5px solid var(--border);
  border-radius:0 0 var(--radius) 0;
}

/* ══ PAGES ══ */
.page{
  display:none;flex:1;overflow-y:auto;overflow-x:hidden;padding:0;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;
}
.page.active{display:flex;flex-direction:column}
.page::-webkit-scrollbar{width:6px}
.page::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}

/* ══ HOME PAGE ══ */
#page-home{align-items:center;justify-content:flex-start;padding-top:10px;gap:20px}

.home-nav{display:flex;align-items:center;gap:10px;width:100%;padding:0 10px}
.home-nav .nav-btns{display:flex;gap:6px;align-items:center;flex-shrink:0}
.home-nav .nav-btns button{
  width:32px;height:32px;border:0;background:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;transition:background .15s;
}
.home-nav .nav-btns button:hover{background:rgba(255,255,255,.08)}
.home-nav .nav-btns button svg{
  width:18px;height:18px;stroke:var(--text);stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;fill:none;
}
.home-url-bar{
  flex:1;height:38px;border-radius:19px;
  background:var(--pill-bg);
  display:flex;align-items:center;padding:0 16px;gap:10px;
}
.home-url-bar svg{
  width:18px;height:18px;stroke:var(--text-dim);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;flex-shrink:0;
}
.home-url-bar input{
  flex:1;background:0;border:0;outline:0;color:var(--text);
  font-family:inherit;font-size:14px;
}
.home-url-bar input::placeholder{color:var(--text-dim)}

.home-hero{
  display:flex;flex-direction:column;align-items:center;gap:28px;
  padding:40px 20px 20px;width:100%;max-width:900px;
}
.home-hero h1{font-size:52px;font-weight:400;text-align:center}

.home-search-bar{
  width:100%;max-width:676px;height:57px;
  border-radius:28.5px;
  background:var(--search-pill-bg);
  border:1.5px solid #fff;
  display:flex;align-items:center;padding:0 24px;gap:12px;
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
}
.home-search-bar svg{
  width:20px;height:20px;stroke:var(--text-dim);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;flex-shrink:0;
}
.home-search-bar input{
  flex:1;background:0;border:0;outline:0;color:var(--text);
  font-family:inherit;font-size:20px;
}
.home-search-bar input::placeholder{color:var(--text-dim)}

.home-cards{
  display:flex;gap:24px;flex-wrap:wrap;justify-content:center;
  padding:10px 0 40px;
}
.home-card{
  width:300px;height:220px;border-radius:var(--radius);
  background:var(--bg-card);
  border:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  cursor:pointer;transition:transform .2s,box-shadow .2s;
}
.home-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.home-card svg{
  width:64px;height:64px;stroke:#fff;stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;
}
.home-card[data-nav="games"] svg{fill:#fff;stroke:none}
.home-card h2{font-size:36px;font-weight:400}

.home-iframe-wrap{display:none;flex:1;width:100%;border-radius:12px;overflow:hidden;min-height:0}
.home-iframe-wrap iframe{width:100%;height:100%;border:0}
#page-home.browsing .home-hero{display:none}
#page-home.browsing .home-cards{display:none}
#page-home.browsing .home-iframe-wrap{display:flex}
#page-home.browsing .home-nav{display:flex}

/* ══ GAMES PAGE ══ */
#page-games{padding:10px 16px;gap:12px}

.games-toolbar{display:flex;gap:12px;align-items:center;flex-shrink:0}

.search-bar{
  flex:1;height:38px;border-radius:19px;
  background:var(--pill-bg);
  display:flex;align-items:center;padding:0 16px;gap:10px;
}
.search-bar svg{
  width:18px;height:18px;stroke:var(--text-dim);stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;flex-shrink:0;
}
.search-bar input{
  flex:1;background:0;border:0;outline:0;color:var(--text);
  font-family:inherit;font-size:16px;
}
.search-bar input::placeholder{color:var(--text-dim)}

/* Dropdown */
.dropdown{position:relative;flex-shrink:0}
.dropdown-btn{
  height:43px;min-width:180px;border-radius:var(--radius-sm);
  background:var(--dropdown-bg);
  border:1px solid var(--border);
  color:var(--text);font-family:inherit;font-size:16px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;gap:10px;cursor:pointer;
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
}
.dropdown-btn svg{width:16px;height:8px;fill:#fff;stroke:none;transition:transform .2s}
.dropdown.open .dropdown-btn svg{transform:rotate(180deg)}

.dropdown-menu{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--dropdown-bg);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:6px 0;
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  z-index:50;display:none;
}
.dropdown.open .dropdown-menu{display:block}
.dropdown-menu button{
  display:block;width:100%;text-align:left;padding:8px 16px;
  background:0;border:0;color:var(--text);font-family:inherit;font-size:15px;
  cursor:pointer;transition:background .15s;
}
.dropdown-menu button:hover{background:rgba(255,255,255,.08)}
.dropdown-menu button.selected{opacity:.5}
.dropdown-menu hr{border:0;border-top:1px solid var(--border);margin:4px 12px}

/* Game grid */
.games-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;padding-bottom:20px;
}
.game-tile{
  aspect-ratio:1;border-radius:14px;overflow:hidden;cursor:pointer;
  position:relative;transition:transform .15s;background:#1a1024;
}
.game-tile:hover{transform:scale(1.04)}
.game-tile img{width:100%;height:100%;object-fit:cover;display:block}
.game-tile .tile-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:8px 10px;font-size:12px;font-weight:500;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.games-empty{text-align:center;padding:60px 20px;opacity:.5;font-size:18px}

/* ══ APPS PAGE ══ */
#page-apps{padding:10px 16px;gap:12px}

.apps-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;padding-bottom:20px;
}
.app-tile{
  aspect-ratio:1;border-radius:14px;overflow:hidden;cursor:pointer;
  position:relative;transition:transform .15s;background:#1a1024;
}
.app-tile:hover{transform:scale(1.04)}
.app-tile img{width:100%;height:100%;object-fit:cover;display:block}
.app-tile .tile-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:8px 10px;font-size:12px;font-weight:500;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ══ UNBLOCKS PAGE ══ */
#page-unblocks{padding:10px 16px;gap:12px}

.section-title{
  font-size:14px;text-transform:uppercase;letter-spacing:2px;
  opacity:.5;padding:10px 0 4px;
}
.unblocks-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:14px;padding-bottom:10px;
}
.unblock-tile{
  height:120px;border-radius:14px;overflow:hidden;cursor:pointer;
  position:relative;transition:transform .15s;
  background:var(--bg-card);border:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;padding:16px;
}
.unblock-tile:hover{transform:scale(1.03);border-color:var(--border)}
.unblock-tile img{width:48px;height:48px;border-radius:10px;object-fit:cover}
.unblock-tile span{font-size:14px;font-weight:500;text-align:center}

/* ══ CONTACTS PAGE ══ */
#page-contacts{padding:10px 16px;gap:12px}

.contacts-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:14px;padding-bottom:20px;
}
.contact-tile{
  height:100px;border-radius:14px;overflow:hidden;cursor:pointer;
  background:var(--bg-card);border:1px solid var(--border-light);
  display:flex;align-items:center;gap:16px;padding:0 20px;
  transition:transform .15s,border-color .15s;
}
.contact-tile:hover{transform:scale(1.02);border-color:var(--border)}
.contact-tile .ct-icon{
  width:40px;height:40px;border-radius:10px;
  background:rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.contact-tile .ct-icon svg{
  width:22px;height:22px;stroke:#fff;stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;fill:none;
}
.contact-tile .ct-info{display:flex;flex-direction:column;gap:2px;min-width:0}
.contact-tile .ct-info strong{font-size:15px;font-weight:500}
.contact-tile .ct-info small{
  font-size:11px;opacity:.45;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ══ RESPONSIVE ══ */
@media(max-width:700px){
  .top-bar{margin:4px 4px 0;padding:0 10px;height:48px;min-height:48px}
  .body-row{margin:0 4px 4px}
  .sidebar{width:44px;min-width:44px;padding:8px 0 10px}
  .sidebar .logo{width:28px;height:28px}
  .sidebar .jq-mark{width:16px;height:20px}
  .sidebar nav button{width:32px;height:32px}
  .sidebar nav button svg{width:16px;height:16px}
  .home-hero h1{font-size:32px}
  .home-search-bar{height:48px}
  .home-search-bar input{font-size:16px}
  .home-cards{flex-direction:column;align-items:center}
  .home-card{width:100%;max-width:320px;height:140px}
  .home-card h2{font-size:28px}
  .games-grid,.apps-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .games-toolbar{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>
<div class="bg"></div>

<div id="app">

<!-- ═══ TOP BAR (horizontal part of L-shape) ═══ -->
<header class="top-bar">
  <span class="brand">JimmyQRG</span>
  <div id="top-bar-content"></div>
  <button class="settings-top" title="Settings" onclick="openSettings()">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
  </button>
</header>

<!-- ═══ BODY ROW (sidebar + main content) ═══ -->
<div class="body-row">

<!-- Sidebar (vertical part of L-shape) -->
<aside class="sidebar">
  <div class="logo" onclick="navigate('home')">
    <svg viewBox="6 8 40 50" fill="none">
      <defs>
        <linearGradient id="logoGrad" x1="42.33" y1="33.87" x2="10.11" y2="33.87" gradientUnits="userSpaceOnUse">
          <stop offset=".298" stop-color="#FF0099"/>
          <stop offset=".5" stop-color="#fff" stop-opacity="0"/>
          <stop offset=".688" stop-color="#009DFF"/>
        </linearGradient>
        <linearGradient id="logoGlow" x1="26" y1="8" x2="26" y2="56" gradientUnits="userSpaceOnUse">
          <stop stop-color="#00FAFF"/>
          <stop offset=".33" stop-color="#A500FF"/>
          <stop offset=".59" stop-color="#FF3D8E"/>
          <stop offset=".88" stop-color="#0400FF"/>
        </linearGradient>
      </defs>
      <path d="M42.334 28L29.964 40.37V55.845H22.478V40.37L10.107 28L26.221 11.887L42.334 28ZM16.498 28.027L26.221 37.749L35.942 28.027L26.221 18.324L16.498 28.027Z" fill="url(#logoGlow)"/>
      <path d="M42.334 28L29.964 40.37V55.845H22.478V40.37L10.107 28L26.221 11.887L42.334 28ZM16.498 28.027L26.221 37.749L35.942 28.027L26.221 18.324L16.498 28.027Z" fill="url(#logoGrad)" fill-opacity="0.5"/>
      <path d="M42.334 28L29.964 40.37V55.845H22.478V40.37L10.107 28L26.221 11.887L42.334 28ZM16.498 28.027L26.221 37.749L35.942 28.027L26.221 18.324L16.498 28.027Z" fill="white" fill-opacity="0.1"/>
    </svg>
  </div>

  <div class="jq-mark">
    <svg viewBox="18 16 14 26" fill="none">
      <path d="M26.994 18H30.202c.693 0 1.141.111 1.345.332.224.22.336.682.336 1.384v18.333c0 .702-.112 1.164-.336 1.385-.203.22-.652.331-1.345.331H26.994V18ZM20.546 33.052h3.85c.285 0 .459.04.52.12.061.08.092.251.092.512v2.348c0 .321.04.552.122.692.102.12.336.181.703.181h.244v2.86h-1.436c-1.487 0-2.618-.251-3.392-.753-.754-.501-1.13-1.374-1.13-2.619v-2.709c0-.421.142-.632.427-.632Z" fill="white"/>
    </svg>
  </div>

  <nav>
    <button data-nav="home" class="active" onclick="navigate('home')" title="Home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
    <button data-nav="games" onclick="navigate('games')" title="Games">
      <svg viewBox="0 0 24 24"><path d="M6 12h4m-2-2v4m5-1h.01M17 11h.01M15 5H9a7 7 0 000 14h6a7 7 0 000-14z"/></svg>
    </button>
    <button data-nav="apps" onclick="navigate('apps')" title="Apps">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </button>
    <button data-nav="unblocks" onclick="navigate('unblocks')" title="Unblocks">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 019.9-1"/></svg>
    </button>
    <button data-nav="contacts" onclick="navigate('contacts')" title="Contacts">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
    </button>
  </nav>
</aside>

<!-- ═══ MAIN CONTENT ═══ -->
<div class="main">

<!-- HOME -->
<section id="page-home" class="page active">
  <div class="home-nav" style="display:none">
    <div class="nav-btns">
      <button id="btn-back" onclick="proxyBack()" title="Back">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="btn-fwd" onclick="proxyForward()" title="Forward">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>

var PROXY_BASE = 'https://rammerhead.fly.dev/unblocker.html';
function proxyUrl(url, raw) {
  return PROXY_BASE + '?' + (raw ? 'raw=true&' : '') + 'url=' + encodeURIComponent(url);
}

/* ── Navigation ── */
var currentPage = 'home';
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.sidebar nav button').forEach(function(b){
    b.classList.toggle('active', b.dataset.nav === page);
  });
  window.history.replaceState(null, '', '#' + page);
}

window.addEventListener('hashchange', function() {
  var h = location.hash.slice(1);
  if (['home','games','apps','unblocks','contacts'].indexOf(h) !== -1) navigate(h);
});
if (location.hash) {
  var h = location.hash.slice(1);
  if (['home','games','apps','unblocks','contacts'].indexOf(h) !== -1) navigate(h);
}

/* ── Proxy / Home ── */
function isUrl(s) {
  return /^https?:\/\//i.test(s) || /^[a-z0-9]+([\-\.]{1}[a-z0-9]+)*\.[a-z]{2,}/i.test(s);
}
function proxyNavigate(input) {
  if (!input.trim()) return;
  var url;
  if (isUrl(input.trim())) {
    url = input.trim();
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  } else {
    url = 'https://duckduckgo.com/?q=' + encodeURIComponent(input.trim());
  }
  document.getElementById('proxy-frame').src = proxyUrl(url);
  document.getElementById('nav-url').value = input.trim();
  document.getElementById('page-home').classList.add('browsing');
  document.querySelector('.home-nav').style.display = '';
}
function proxyBack() { try { document.getElementById('proxy-frame').contentWindow.history.back(); } catch(e){} }
function proxyForward() { try { document.getElementById('proxy-frame').contentWindow.history.forward(); } catch(e){} }
function proxyRefresh() { try { var f = document.getElementById('proxy-frame'); f.src = f.src; } catch(e){} }

function gameTileHTML(g, imgBase) {
  var src = imgBase ? imgBase : '/game-images/games/' + g.img + '.png';
  var escaped = g.url.replace(/'/g, "\\'");
  return '<div class="game-tile" onclick="openGame(\'' + escaped + '\')">' +
    '<img src="' + src + '" alt="' + g.n + '" loading="lazy" onerror="this.style.display=\'none\'">' +
    '<div class="tile-label">' + g.n + '</div></div>';
}

var gameTab = 'all';
function renderGames() {
  var c = document.getElementById('games-container');
  var q = (document.getElementById('games-search').value || '').toLowerCase();
  var html = '';
  if (gameTab === 'all') {
    var filtered = GAMES.filter(function(g){ return g.n.toLowerCase().indexOf(q) !== -1; });
    if (!filtered.length) html = '<div class="games-empty">No games found</div>';
    else filtered.forEach(function(g){ html += gameTileHTML(g); });
  } else if (gameTab === 'collections') {
    var filtered = COLLECTIONS.filter(function(g){ return g.n.toLowerCase().indexOf(q) !== -1; });
    if (!filtered.length) html = '<div class="games-empty">No collections found</div>';
    else filtered.forEach(function(g){ html += gameTileHTML(g, g.img); });
  } else if (gameTab === 'pending') {
    var filtered = PENDING.filter(function(g){ return g.n.toLowerCase().indexOf(q) !== -1; });
    if (!filtered.length) html = '<div class="games-empty">No pending games</div>';
    else filtered.forEach(function(g){ html += gameTileHTML(g); });
  }
  c.innerHTML = html;
}

function filterGames() { renderGames(); }

function setGameTab(tab) {
  gameTab = tab;
  var labels = {all:'All Games',collections:'Collections',pending:'Pending'};
  document.getElementById('dd-label').textContent = labels[tab];
  document.getElementById('games-dropdown').classList.remove('open');
  document.querySelectorAll('#games-dropdown .dropdown-menu button').forEach(function(b){ b.classList.remove('selected'); });
  if (event && event.target) event.target.classList.add('selected');
  renderGames();
}

function toggleDropdown() {
  document.getElementById('games-dropdown').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('#games-dropdown')) {
    document.getElementById('games-dropdown').classList.remove('open');
  }
});

function renderApps() {
  var c = document.getElementById('apps-container');
  var q = (document.getElementById('apps-search').value || '').toLowerCase();
  var filtered = APPS.filter(function(a){ return a.n.toLowerCase().indexOf(q) !== -1; });
  var html = '';
  filtered.forEach(function(a) {
    var onclick;
    if (a.proxy) {
      var href = proxyUrl('https://' + a.url, !!a.raw);
      onclick = "window.open('" + href.replace(/'/g, "\\'") + "','_blank')";
    } else {
      onclick = "window.open('" + a.url.replace(/'/g, "\\'") + "','_blank')";
    }
    html += '<div class="app-tile" onclick="' + onclick + '">' +
      '<img src="/game-images/apps/' + a.img + '.png" alt="' + a.n + '" loading="lazy" onerror="this.style.display=\'none\'">' +
      '<div class="tile-label">' + a.n + '</div></div>';
  });
  if (!filtered.length) html = '<div class="games-empty">No apps found</div>';
  c.innerHTML = html;
}
function filterApps() { renderApps(); }

function renderUnblocks() {
  var c = document.getElementById('unblocks-container');
  var html = '<div class="section-title">Proxies &amp; Tools</div><div class="unblocks-grid">';
  UNBLOCKS.forEach(function(u) {
    var target = u.url.indexOf('http') === 0 ? '_blank' : '_self';
    html += '<div class="unblock-tile" onclick="window.open(\'' + u.url + '\',\'' + target + '\')">' +
      '<img src="/game-images/unblocks/' + u.img + '.png" alt="' + u.n + '" loading="lazy" onerror="this.style.display=\'none\'">' +
      '<span>' + u.n + '</span></div>';
  });
  html += '</div>';
  c.innerHTML = html;
}

function renderContacts() {
  var c = document.getElementById('contacts-container');
  var icons = {
    chat:'<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
    discord:'<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
    bug:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
    suggest:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
    dev:'<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>',
  };
  var html = '';
  CONTACTS.forEach(function(ct) {
    var escaped = ct.url.replace(/'/g, "\\'");
    html += '<div class="contact-tile" onclick="window.open(\'' + escaped + '\',\'_blank\')">' +
      '<div class="ct-icon"><svg viewBox="0 0 24 24">' + icons[ct.icon] + '</svg></div>' +
      '<div class="ct-info"><strong>' + ct.n + '</strong><small>' + ct.desc + '</small></div></div>';
  });
  c.innerHTML = html;
}

function openSettings() {}

/* ── Init ── */
renderGames();
renderApps();
renderUnblocks();
renderContacts();
</script>
</body>
