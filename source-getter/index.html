<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0}
.wrap{display:flex;flex-direction:column;height:100%;padding:16px;gap:12px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.toolbar h1{font-size:16px;font-weight:600;color:#e94560;margin-right:8px}
.toolbar input[type="text"]{flex:1;min-width:200px;padding:8px 12px;border:1px solid #0f3460;border-radius:4px;background:#0a0a1a;color:#e0e0e0;font-size:14px}
.toolbar button{padding:8px 18px;border:1px solid #0f3460;border-radius:4px;background:#0f3460;color:#e0e0e0;cursor:pointer;font-size:13px;transition:background .15s;white-space:nowrap}
.toolbar button:hover{background:#e94560;border-color:#e94560;color:#fff}
.toolbar button:disabled{opacity:.5;cursor:default}
.status{font-size:13px;color:#888;min-height:18px}
.output{flex:1;min-height:0;display:flex;flex-direction:column}
.output pre{flex:1;overflow:auto;padding:12px;font-family:"Consolas","Monaco","Courier New",monospace;font-size:13px;line-height:1.5;background:#0a0a1a;border:1px solid #0f3460;border-radius:4px;white-space:pre-wrap;word-break:break-all;color:#a9b7c6}
.copy-bar{display:flex;justify-content:flex-end;padding-top:8px;gap:8px}
.copy-bar button{padding:6px 14px;border:1px solid #0f3460;border-radius:4px;background:#0f3460;color:#e0e0e0;cursor:pointer;font-size:12px;transition:background .15s}
.copy-bar button:hover{background:#e94560;border-color:#e94560;color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <h1>Source Viewer</h1>
    <input type="text" id="url" placeholder="Enter URL (e.g. https://example.com)" value="">
    <button id="fetchBtn">Fetch Source</button>
  </div>
  <div class="status" id="status"></div>
  <div class="output">
    <pre id="result">Enter a URL above and click Fetch Source to view its HTML.</pre>
    <div class="copy-bar">
      <button id="copyBtn">Copy to Clipboard</button>
      <button id="dlBtn">Download as HTML</button>
    </div>
  </div>
</div>
<script>
var urlEl=document.getElementById('url');
var resultEl=document.getElementById('result');
var statusEl=document.getElementById('status');
var fetchBtn=document.getElementById('fetchBtn');

function doFetch(){
  var raw=urlEl.value.trim();
  if(!raw){statusEl.textContent='Please enter a URL.';return;}
  if(!/^https?:\/\//i.test(raw))raw='https://'+raw;
  statusEl.textContent='Fetching…';
  resultEl.textContent='';
  fetchBtn.disabled=true;

  var proxies=[
    'https://api.allorigins.win/raw?url='+encodeURIComponent(raw),
    'https://corsproxy.io/?'+encodeURIComponent(raw),
    'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(raw)
  ];

  tryNext(proxies,0,raw);
}

function tryNext(proxies,i,original){
  if(i>=proxies.length){
    statusEl.textContent='All proxies failed. The site may block external requests.';
    resultEl.textContent='Could not fetch the source for: '+original;
    fetchBtn.disabled=false;
    return;
  }
  fetch(proxies[i]).then(function(r){
    if(!r.ok)throw new Error(r.status);
    return r.text();
  }).then(function(text){
    resultEl.textContent=text;
    statusEl.textContent='Fetched '+text.length.toLocaleString()+' characters from '+original;
    fetchBtn.disabled=false;
  }).catch(function(){
    tryNext(proxies,i+1,original);
  });
}

fetchBtn.addEventListener('click',doFetch);
urlEl.addEventListener('keydown',function(e){if(e.key==='Enter')doFetch();});

document.getElementById('copyBtn').addEventListener('click',function(){
  navigator.clipboard.writeText(resultEl.textContent).then(function(){
    statusEl.textContent='Copied to clipboard!';
  });
});

document.getElementById('dlBtn').addEventListener('click',function(){
  var blob=new Blob([resultEl.textContent],{type:'text/html;charset=utf-8'});
  var u=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=u;a.download='source.html';document.body.appendChild(a);a.click();a.remove();
  setTimeout(function(){URL.revokeObjectURL(u)},5000);
});
</script>
</body>
</html>
