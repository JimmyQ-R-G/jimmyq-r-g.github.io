<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Launcher</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: #fff;
      overflow: hidden;
    }

    body {
      background: url("/eaglercraft-background.png") center center / cover no-repeat fixed;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.52);
    }

    .panel {
      position: relative;
      z-index: 1;
      width: min(760px, 92vw);
      text-align: center;
      padding: 28px 22px;
      border-radius: 14px;
      background: rgba(10, 10, 10, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
    }

    .warning {
      margin: 0 0 16px;
      font-size: clamp(20px, 3.4vw, 34px);
      line-height: 1.35;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
    }

    .sync-info {
      margin: 0 0 18px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(72, 175, 117, 0.18);
      border: 1px solid rgba(72, 175, 117, 0.45);
      font-size: clamp(13px, 1.6vw, 15px);
      line-height: 1.45;
      text-align: left;
    }

    .sync-info.signed-out {
      background: rgba(255, 196, 0, 0.18);
      border-color: rgba(255, 196, 0, 0.45);
    }

    .sync-info strong { color: #fff; }

    .countdown {
      margin: 0 0 24px;
      font-size: clamp(22px, 3.8vw, 38px);
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.75);
    }

    .skip-btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 18px;
      font-weight: 700;
      color: #111;
      background: #ffffff;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
      box-shadow: 0 7px 16px rgba(0, 0, 0, 0.35);
    }

    .skip-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.42);
    }

    .skip-btn:active {
      transform: translateY(0);
    }
  </style>

<!-- JQRG_CLOUD_INJECT_BEGIN --><script src="/js/jqrg-cloud.js" defer></script><script src="/js/jqrg-auth-ui.js" defer></script><!-- JQRG_CLOUD_INJECT_END -->
</head>
<body>
  <main class="panel">
    <p class="warning">This version of Minecraft is extremely unstable and has many bugs.</p>
    <div class="sync-info" id="syncInfo">Checking your account&hellip;</div>
    <p class="countdown" id="countdownText">Starting in 5</p>
    <button class="skip-btn" id="skipBtn" type="button">Skip Countdown</button>
  </main>

  <script>
    const REDIRECT_BASE = "https://mcraft.fly.dev";
    const countdownText = document.getElementById("countdownText");
    const skipBtn = document.getElementById("skipBtn");
    const syncInfo = document.getElementById("syncInfo");

    let secondsRemaining = 5;
    let redirected = false;

    function buildRedirectUrl() {
      let token = null;
      try {
        if (window.JqrgCloud && typeof window.JqrgCloud.getToken === "function") {
          token = window.JqrgCloud.getToken();
        }
      } catch (_) {}
      if (!token) return REDIRECT_BASE;
      const sep = REDIRECT_BASE.indexOf("?") === -1 ? "?" : "&";
      return REDIRECT_BASE + sep + "sso=" + encodeURIComponent(token);
    }

    function goToGame() {
      if (redirected) return;
      redirected = true;
      window.location.href = buildRedirectUrl();
    }

    function renderCountdown() {
      countdownText.textContent = "Starting in " + secondsRemaining;
    }

    function renderSyncInfo() {
      let user = null;
      try {
        if (window.JqrgCloud && typeof window.JqrgCloud.getUser === "function") {
          user = window.JqrgCloud.getUser();
        }
      } catch (_) {}
      if (user) {
        syncInfo.classList.remove("signed-out");
        syncInfo.innerHTML =
          "<strong>World saves will sync to your account.</strong> " +
          "Your singleplayer worlds, server list and settings stay in sync " +
          "across every device you sign in on \u2014 nothing is erased.";
      } else {
        syncInfo.classList.add("signed-out");
        syncInfo.innerHTML =
          "<strong>You are not signed in.</strong> " +
          "World saves will only live on this device. " +
          "Sign in on the home page first if you want them to sync to your account.";
      }
    }

    function whenCloudReady(cb, timeoutMs) {
      const start = Date.now();
      const tick = function () {
        if (window.JqrgCloud) { cb(); return; }
        if (Date.now() - start > (timeoutMs || 1500)) { cb(); return; }
        setTimeout(tick, 60);
      };
      tick();
    }

    whenCloudReady(renderSyncInfo);
    renderCountdown();

    const timer = setInterval(() => {
      secondsRemaining -= 1;
      if (secondsRemaining <= 0) {
        clearInterval(timer);
        goToGame();
        return;
      }
      renderCountdown();
    }, 1000);

    skipBtn.addEventListener("click", () => {
      clearInterval(timer);
      goToGame();
    });
  </script>
</body>
</html>
