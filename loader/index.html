<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>loader</title>
<link rel="icon" id="cloakFavicon" href="/jq.ico">
<link rel="shortcut icon" href="/jq.ico">
<script>
(function(){
  var d=localStorage.getItem('defaultCloak');
  if(d!=='true'){
    var t=localStorage.getItem('cloakTabName');
    var i=localStorage.getItem('cloakIcon');
    if(t)document.title=t;
    if(i){
      var f=document.getElementById('cloakFavicon');
      if(f)f.href=i;
    }
  }
})();
</script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0e0514;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
#mainContent{width:100%;height:100%;position:relative}
#main-iframe{width:100%;height:100%;border:0;display:block}
#bottomMenu{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:1000;transition:all .3s ease}
#toggleMenu{
  width:48px;height:28px;border-radius:14px 14px 0 0;
  background:rgba(14,5,20,.85);border:1px solid rgba(255,255,255,.15);border-bottom:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  backdrop-filter:blur(12px);margin:0 auto;
}
#toggleMenu .material-icons{font-size:20px;color:rgba(255,255,255,.7);transition:transform .3s}
#menuContent{
  display:none;background:rgba(14,5,20,.92);border:1px solid rgba(255,255,255,.12);
  border-bottom:0;border-radius:16px 16px 0 0;padding:12px 16px;
  backdrop-filter:blur(16px);min-width:320px;
}
#bottomMenu.expanded #menuContent{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.menu-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);cursor:pointer;transition:all .2s;min-width:64px;
}
.menu-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.menu-btn .icon{font-size:22px;color:rgba(255,255,255,.8)}
.menu-btn .text{font-size:10px;color:rgba(255,255,255,.6);white-space:nowrap}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);
}
.modal-overlay.active{display:flex}
.modal-box{
  background:#1a1024;border:1px solid rgba(255,255,255,.12);border-radius:16px;
  padding:24px;max-width:480px;width:90%;max-height:85vh;overflow-y:auto;position:relative;
}
.modal-box h2{font-size:18px;margin-bottom:16px;font-weight:600}
.modal-close{
  position:absolute;top:12px;right:12px;background:0;border:0;color:#fff;
  cursor:pointer;font-size:22px;opacity:.6;transition:opacity .2s;
}
.modal-close:hover{opacity:1}

.icon-grid{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
.icon-option{
  width:56px;height:56px;border-radius:10px;border:2px solid rgba(255,255,255,.1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;padding:4px;gap:2px;
}
.icon-option:hover{border-color:rgba(255,255,255,.3)}
.icon-option.selected{border-color:#a855f7;background:rgba(168,85,247,.15)}
.icon-img{width:28px;height:28px;object-fit:contain;border-radius:4px}
.icon-name{font-size:8px;opacity:.6;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}

.upload-area{
  border:2px dashed rgba(255,255,255,.15);border-radius:10px;padding:16px;
  text-align:center;cursor:pointer;transition:all .2s;margin:8px 0;
  font-size:13px;opacity:.6;
}
.upload-area:hover{border-color:rgba(255,255,255,.3);opacity:.8}

.form-row{display:flex;align-items:center;gap:10px;margin:10px 0}
.form-row label{font-size:13px;opacity:.8;min-width:70px}
.form-row input[type="text"],.form-row select{
  flex:1;padding:8px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;color:#fff;font-size:13px;outline:0;font-family:inherit;
}
.form-row input:focus{border-color:rgba(255,255,255,.3)}

.btn-primary{
  padding:8px 20px;border-radius:8px;border:0;
  background:linear-gradient(135deg,#a855f7,#6366f1);color:#fff;cursor:pointer;
  font-size:13px;font-family:inherit;transition:opacity .2s;
}
.btn-primary:hover{opacity:.85}
.btn-secondary{
  padding:8px 20px;border-radius:8px;border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);color:#fff;cursor:pointer;
  font-size:13px;font-family:inherit;transition:all .2s;
}
.btn-secondary:hover{background:rgba(255,255,255,.12)}

.toggle-row{display:flex;align-items:center;justify-content:space-between;margin:10px 0}
.toggle-row label{font-size:13px;opacity:.8}
.toggle-switch-sm{
  width:40px;height:22px;border-radius:11px;background:rgba(255,255,255,.15);
  position:relative;cursor:pointer;transition:background .3s;
}
.toggle-switch-sm::after{
  content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;
  border-radius:50%;background:#fff;transition:transform .3s;
}
.toggle-switch-sm.active{background:#a855f7}
.toggle-switch-sm.active::after{transform:translateX(18px)}

.slider-row{margin:8px 0}
.slider-row label{font-size:12px;opacity:.7;display:block;margin-bottom:4px}
.slider-row input[type="range"]{width:100%;accent-color:#a855f7}

.key-btn{
  padding:6px 16px;border-radius:6px;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:12px;
  font-family:inherit;transition:all .2s;
}
.key-btn:hover{background:rgba(255,255,255,.12)}
.key-btn.recording{border-color:#ef4444;background:rgba(239,68,68,.15);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.status-indicator{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.status-dot{width:10px;height:10px;border-radius:50%}
.status-indicator.active .status-dot{background:#22c55e}
.status-indicator.inactive .status-dot{background:#ef4444}
.status-text{font-size:13px;opacity:.8}

.expandable{max-height:0;overflow:hidden;transition:max-height .3s}
.expandable.expanded{max-height:500px}

#notificationContainer{position:fixed;top:20px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:8px}
.notification{
  padding:12px 18px;border-radius:10px;background:rgba(14,5,20,.92);
  border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(12px);
  transform:translateX(120%);transition:transform .3s;min-width:240px;
}
.notification.show{transform:translateX(0)}
.notification.error{border-color:rgba(239,68,68,.4)}
.notification.success{border-color:rgba(34,197,94,.4)}
.notification-title{font-size:13px;font-weight:600;margin-bottom:2px}
.notification-message{font-size:11px;opacity:.7}
</style>
</head>
<body>
<div id="mainContent">
  <iframe id="main-iframe" allow="autoplay;fullscreen;gamepad;microphone;camera"></iframe>
</div>

<div id="bottomMenu">
  <div id="toggleMenu"><span class="material-icons" id="toggleIcon">expand_less</span></div>
  <div id="menuContent">
    <div class="menu-btn" id="btnClose"><span class="material-icons icon">close</span><span class="text">Close</span></div>
    <div class="menu-btn" id="btnAutoClicker"><span class="material-icons icon" id="autoClickerIcon">ads_click</span><span class="text">Auto Click</span></div>
    <div class="menu-btn" id="btnRefresh"><span class="material-icons icon">refresh</span><span class="text">Refresh</span></div>
    <div class="menu-btn" id="btnDownload"><span class="material-icons icon">download</span><span class="text">Download</span></div>
    <div class="menu-btn" id="btnFullscreen"><span class="material-icons icon">fullscreen</span><span class="text">Fullscreen</span></div>
    <div class="menu-btn" id="btnCloak"><span class="material-icons icon">visibility_off</span><span class="text">Cloak</span></div>
  </div>
</div>

<div class="modal-overlay" id="cloakModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">&times;</button>
    <h2>Tab Cloak</h2>
    <div class="toggle-row">
      <label>Use Default Cloak</label>
      <input type="checkbox" id="defaultCloak">
    </div>
    <div id="customCloakOptions" class="expandable expanded">
      <div style="margin-top:12px">
        <label style="font-size:13px;opacity:.8;display:block;margin-bottom:8px">Select Icon</label>
        <div class="icon-grid" id="iconGrid"></div>
        <div class="upload-area" id="uploadArea">Click or drag to upload custom icon</div>
        <input type="file" id="fileUpload" accept="image/*" style="display:none">
      </div>
      <div class="form-row" style="margin-top:12px">
        <label>Tab Name</label>
        <input type="text" id="tabName" placeholder="Enter tab name">
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn-secondary" id="cancelCloak">Cancel</button>
      <button class="btn-primary" id="applyCloak">Apply</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="autoClickerModal">
  <div class="modal-box">
    <button class="modal-close" id="closeAutoClickerModal">&times;</button>
    <h2>Auto Clicker</h2>
    <div class="status-indicator inactive" id="autoClickerStatus">
      <div class="status-dot"></div>
      <span class="status-text">Inactive</span>
    </div>
    <div class="form-row"><label>CPS</label><input type="number" id="cpsInput" value="10" min="1" max="1000" style="width:80px;flex:none"></div>
    <div class="slider-row"><label>CPS Random Offset: <span id="cpsRandomValue">0.00</span></label><input type="range" id="cpsRandomSlider" min="0" max="100" value="0"></div>
    <div class="form-row"><label>Click Type</label><select id="clickTypeSelect"><option value="single">Single</option><option value="double">Double</option></select></div>
    <div class="form-row"><label>Button</label><select id="clickButtonSelect"><option value="left">Left</option><option value="right">Right</option></select></div>
    <div class="toggle-row"><label>Drag Click</label><input type="checkbox" id="dragClickToggle"></div>
    <div class="expandable" id="dragClickSettings">
      <div class="slider-row"><label>Drag Duration: <span id="dragDurationValue">2.00</span>s</label><input type="range" id="dragDurationSlider" min="10" max="1000" value="200"></div>
      <div class="slider-row"><label>Rest Duration: <span id="restDurationValue">1.00</span>s</label><input type="range" id="restDurationSlider" min="10" max="1000" value="100"></div>
      <div class="slider-row"><label>Duration Random: <span id="durationRandomValue">0.00</span></label><input type="range" id="durationRandomSlider" min="0" max="100" value="0"></div>
    </div>
    <div class="form-row" style="margin-top:12px"><label>Keyboard</label><select id="keyboardTypeSelect"><option value="trigger">Trigger Key</option><option value="startStop">Start/Stop Keys</option></select></div>
    <div id="triggerKeySettings"><div class="form-row"><label>Trigger</label><button class="key-btn" id="triggerKeyBtn">Unbound</button></div></div>
    <div class="expandable" id="startStopKeySettings">
      <div class="form-row"><label>Start</label><button class="key-btn" id="startKeyBtn">Unbound</button></div>
      <div class="form-row"><label>Stop</label><button class="key-btn" id="stopKeyBtn">Unbound</button></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap">
      <button class="btn-secondary" id="saveAutoClickerSettings">Save</button>
      <button class="btn-primary" id="startAutoClicker">Start</button>
      <button class="btn-secondary" id="stopAutoClicker" disabled>Stop</button>
    </div>
  </div>
</div>

<div id="notificationContainer"></div>

<script>
const mainContent=document.getElementById('mainContent'),mainIframe=document.getElementById('main-iframe'),bottomMenu=document.getElementById('bottomMenu'),toggleMenu=document.getElementById('toggleMenu'),toggleIcon=document.getElementById('toggleIcon'),menuContent=document.getElementById('menuContent'),notificationContainer=document.getElementById('notificationContainer');
const btnClose=document.getElementById('btnClose'),btnAutoClicker=document.getElementById('btnAutoClicker'),autoClickerIcon=document.getElementById('autoClickerIcon'),btnRefresh=document.getElementById('btnRefresh'),btnDownload=document.getElementById('btnDownload'),btnFullscreen=document.getElementById('btnFullscreen'),btnCloak=document.getElementById('btnCloak');
const cloakModal=document.getElementById('cloakModal'),closeModal=document.getElementById('closeModal'),defaultCloak=document.getElementById('defaultCloak'),customCloakOptions=document.getElementById('customCloakOptions'),iconGrid=document.getElementById('iconGrid'),uploadArea=document.getElementById('uploadArea'),fileUpload=document.getElementById('fileUpload'),tabName=document.getElementById('tabName'),applyCloak=document.getElementById('applyCloak'),cancelCloak=document.getElementById('cancelCloak');
const autoClickerModal=document.getElementById('autoClickerModal'),closeAutoClickerModal=document.getElementById('closeAutoClickerModal'),autoClickerStatus=document.getElementById('autoClickerStatus');
const cpsInput=document.getElementById('cpsInput'),cpsRandomSlider=document.getElementById('cpsRandomSlider'),cpsRandomValue=document.getElementById('cpsRandomValue'),clickTypeSelect=document.getElementById('clickTypeSelect'),clickButtonSelect=document.getElementById('clickButtonSelect'),dragClickToggle=document.getElementById('dragClickToggle'),dragClickSettings=document.getElementById('dragClickSettings'),dragDurationSlider=document.getElementById('dragDurationSlider'),dragDurationValue=document.getElementById('dragDurationValue'),restDurationSlider=document.getElementById('restDurationSlider'),restDurationValue=document.getElementById('restDurationValue'),durationRandomSlider=document.getElementById('durationRandomSlider'),durationRandomValue=document.getElementById('durationRandomValue'),keyboardTypeSelect=document.getElementById('keyboardTypeSelect'),triggerKeySettings=document.getElementById('triggerKeySettings'),startStopKeySettings=document.getElementById('startStopKeySettings'),triggerKeyBtn=document.getElementById('triggerKeyBtn'),startKeyBtn=document.getElementById('startKeyBtn'),stopKeyBtn=document.getElementById('stopKeyBtn'),startAutoClicker=document.getElementById('startAutoClicker'),stopAutoClicker=document.getElementById('stopAutoClicker'),saveAutoClickerSettings=document.getElementById('saveAutoClickerSettings');

let isMenuExpanded=false,isFullscreen=false,selectedIcon='default.png';
let isAutoClickerActive=false,autoClickerInterval=null,isDragClickActive=false,dragClickTimeout=null,isRecordingKey=false,currentRecordingButton=null;
let autoClickerSettings={cps:10,cpsRandomOffset:0,clickType:'single',clickButton:'left',dragClick:false,dragDuration:2.0,restDuration:1.0,durationRandomOffset:0,keyboardType:'trigger',triggerKey:null,startKey:null,stopKey:null};

const iconOptions=[
  {name:'Default',url:'https://jimmyqrg.github.io/cloak-images/default.png'},
  {name:'Gmail',url:'https://jimmyqrg.github.io/cloak-images/gmail.png'},
  {name:'Drive',url:'https://jimmyqrg.github.io/cloak-images/drive.png'},
  {name:'Docs',url:'https://jimmyqrg.github.io/cloak-images/docs.png'},
  {name:'Forms',url:'https://jimmyqrg.github.io/cloak-images/forms.png'},
  {name:'Pausd',url:'https://jimmyqrg.github.io/cloak-images/pausd.png'},
  {name:'Schoology',url:'https://jimmyqrg.github.io/cloak-images/schoology.png'}
];

function init(){applyCloakImmediately();checkContentParam();setupEventListeners();populateIconGrid();loadCloakSettings();loadAutoClickerSettings()}

function applyCloakImmediately(){
  var s=localStorage.getItem('defaultCloak');
  if(s!=='true'){
    var t=localStorage.getItem('cloakTabName'),i=localStorage.getItem('cloakIcon');
    if(t)document.title=t;
    if(i){var f=document.getElementById('cloakFavicon');if(f)f.href=i;document.querySelectorAll('link[rel="icon"],link[rel="shortcut icon"]').forEach(function(l){l.href=i})}
  }
}

function checkContentParam(){
  var params=new URLSearchParams(window.location.search);
  var raw=params.get('content');
  var urlToLoad='https://jimmyqrg.github.io/?page=extend';
  if(raw){
    var decoded;
    try{decoded=decodeURIComponent(raw)}catch(e){}
    if(decoded){
      try{
        var url=new URL(decoded,window.location.origin);
        if(url.protocol==='http:'||url.protocol==='https:')urlToLoad=url.href;
      }catch(e){
        if(decoded.startsWith('/'))urlToLoad=window.location.origin+decoded;
        else urlToLoad=decoded;
      }
    }
  }
  mainIframe.src=urlToLoad;
}

function setupEventListeners(){
  toggleMenu.addEventListener('click',toggleMenuState);
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){
      if(isMenuExpanded)collapseMenu();
      if(cloakModal.classList.contains('active'))closeCloakModal();
      if(autoClickerModal.classList.contains('active'))closeAutoClickerModalFunc();
      if(isFullscreen)exitFullscreen();
      if(isRecordingKey)stopRecordingKey();
    }
    handleAutoClickerKeyPress(e);
  });
  btnClose.addEventListener('click',function(){window.close();collapseMenu()});
  btnAutoClicker.addEventListener('click',openAutoClickerModal);
  btnRefresh.addEventListener('click',function(){try{mainIframe.contentWindow.location.reload()}catch(e){mainIframe.src=mainIframe.src}collapseMenu()});
  btnDownload.addEventListener('click',downloadSource);
  btnFullscreen.addEventListener('click',toggleFullscreen);
  btnCloak.addEventListener('click',openCloakModal);
  closeModal.addEventListener('click',closeCloakModal);
  cloakModal.addEventListener('click',function(e){if(e.target===cloakModal)closeCloakModal()});
  defaultCloak.addEventListener('change',toggleCustomCloakOptions);
  uploadArea.addEventListener('click',function(){fileUpload.click()});
  fileUpload.addEventListener('change',handleImageUpload);
  applyCloak.addEventListener('click',applyCloakSettings);
  cancelCloak.addEventListener('click',function(){if(defaultCloak.checked)resetToDefaultCloak();closeCloakModal()});
  closeAutoClickerModal.addEventListener('click',closeAutoClickerModalFunc);
  autoClickerModal.addEventListener('click',function(e){if(e.target===autoClickerModal)closeAutoClickerModalFunc()});
  cpsInput.addEventListener('input',updateCps);
  cpsRandomSlider.addEventListener('input',updateCpsRandomOffset);
  dragClickToggle.addEventListener('change',toggleDragClickSettings);
  dragDurationSlider.addEventListener('input',updateDragDuration);
  restDurationSlider.addEventListener('input',updateRestDuration);
  durationRandomSlider.addEventListener('input',updateDurationRandomOffset);
  keyboardTypeSelect.addEventListener('change',toggleKeyboardSettings);
  triggerKeyBtn.addEventListener('click',function(){startRecordingKey(triggerKeyBtn,'trigger')});
  startKeyBtn.addEventListener('click',function(){startRecordingKey(startKeyBtn,'start')});
  stopKeyBtn.addEventListener('click',function(){startRecordingKey(stopKeyBtn,'stop')});
  startAutoClicker.addEventListener('click',startAutoClickerFunc);
  stopAutoClicker.addEventListener('click',stopAutoClickerFunc);
  saveAutoClickerSettings.addEventListener('click',saveAutoClickerSettingsFunc);
  document.addEventListener('fullscreenchange',handleFullscreenChange);
  document.addEventListener('webkitfullscreenchange',handleFullscreenChange);
}

function toggleMenuState(){isMenuExpanded?collapseMenu():expandMenu()}
function expandMenu(){bottomMenu.classList.add('expanded');toggleIcon.textContent='expand_more';isMenuExpanded=true}
function collapseMenu(){bottomMenu.classList.remove('expanded');toggleIcon.textContent='expand_less';isMenuExpanded=false}

function openAutoClickerModal(){autoClickerModal.classList.add('active');collapseMenu();updateAutoClickerUI()}
function closeAutoClickerModalFunc(){autoClickerModal.classList.remove('active');if(isRecordingKey)stopRecordingKey()}

function updateAutoClickerUI(){
  if(isAutoClickerActive){autoClickerStatus.className='status-indicator active';autoClickerStatus.querySelector('.status-text').textContent='Active';startAutoClicker.disabled=true;stopAutoClicker.disabled=false}
  else{autoClickerStatus.className='status-indicator inactive';autoClickerStatus.querySelector('.status-text').textContent='Inactive';startAutoClicker.disabled=false;stopAutoClicker.disabled=true}
  if(autoClickerSettings.triggerKey)triggerKeyBtn.textContent=formatKeyName(autoClickerSettings.triggerKey);
  if(autoClickerSettings.startKey)startKeyBtn.textContent=formatKeyName(autoClickerSettings.startKey);
  if(autoClickerSettings.stopKey)stopKeyBtn.textContent=formatKeyName(autoClickerSettings.stopKey);
}

function formatKeyName(k){if(!k)return'Unbound';var m={' ':'Space','Control':'Ctrl','Escape':'Esc','ArrowUp':'↑','ArrowDown':'↓','ArrowLeft':'←','ArrowRight':'→'};return m[k]||k}
function updateCps(){autoClickerSettings.cps=Math.max(1,Math.min(1000,parseInt(cpsInput.value)||10));cpsInput.value=autoClickerSettings.cps}
function updateCpsRandomOffset(){var v=parseInt(cpsRandomSlider.value)/100;autoClickerSettings.cpsRandomOffset=v;cpsRandomValue.textContent=v.toFixed(2)}
function toggleDragClickSettings(){autoClickerSettings.dragClick=dragClickToggle.checked;dragClickSettings.classList.toggle('expanded',autoClickerSettings.dragClick)}
function updateDragDuration(){var v=parseInt(dragDurationSlider.value)/100;autoClickerSettings.dragDuration=v;dragDurationValue.textContent=v.toFixed(2)}
function updateRestDuration(){var v=parseInt(restDurationSlider.value)/100;autoClickerSettings.restDuration=v;restDurationValue.textContent=v.toFixed(2)}
function updateDurationRandomOffset(){var v=parseInt(durationRandomSlider.value)/100;autoClickerSettings.durationRandomOffset=v;durationRandomValue.textContent=v.toFixed(2)}
function toggleKeyboardSettings(){autoClickerSettings.keyboardType=keyboardTypeSelect.value;triggerKeySettings.style.display=autoClickerSettings.keyboardType==='trigger'?'block':'none';startStopKeySettings.classList.toggle('expanded',autoClickerSettings.keyboardType==='startStop')}

function startRecordingKey(btn,type){if(isRecordingKey){stopRecordingKey();if(currentRecordingButton===btn)return}isRecordingKey=true;currentRecordingButton=btn;btn.textContent='RECORDING';btn.classList.add('recording');showNotification('Recording Key','Press any key to bind. ESC to cancel.','info')}
function stopRecordingKey(){if(!isRecordingKey)return;isRecordingKey=false;if(currentRecordingButton){currentRecordingButton.classList.remove('recording');var id=currentRecordingButton.id;if(id==='triggerKeyBtn')currentRecordingButton.textContent=autoClickerSettings.triggerKey?formatKeyName(autoClickerSettings.triggerKey):'Unbound';else if(id==='startKeyBtn')currentRecordingButton.textContent=autoClickerSettings.startKey?formatKeyName(autoClickerSettings.startKey):'Unbound';else if(id==='stopKeyBtn')currentRecordingButton.textContent=autoClickerSettings.stopKey?formatKeyName(autoClickerSettings.stopKey):'Unbound'}currentRecordingButton=null}

function handleAutoClickerKeyPress(e){
  if(!isRecordingKey){
    var k=e.key;
    if(autoClickerSettings.keyboardType==='trigger'&&autoClickerSettings.triggerKey===k){isAutoClickerActive?stopAutoClickerFunc():startAutoClickerFunc();e.preventDefault()}
    else if(autoClickerSettings.keyboardType==='startStop'){if(autoClickerSettings.startKey===k){startAutoClickerFunc();e.preventDefault()}else if(autoClickerSettings.stopKey===k){stopAutoClickerFunc();e.preventDefault()}}
    return;
  }
  e.preventDefault();e.stopPropagation();
  if(e.key==='Escape'){stopRecordingKey();return}
  var k=e.key,id=currentRecordingButton.id;
  if(id==='triggerKeyBtn')autoClickerSettings.triggerKey=k;
  else if(id==='startKeyBtn')autoClickerSettings.startKey=k;
  else if(id==='stopKeyBtn')autoClickerSettings.stopKey=k;
  currentRecordingButton.textContent=formatKeyName(k);
  showNotification('Key Set','Key set to: '+formatKeyName(k),'success');
  stopRecordingKey();
}

function startAutoClickerFunc(){
  if(isAutoClickerActive)return;updateCps();updateCpsRandomOffset();
  autoClickerSettings.clickType=clickTypeSelect.value;autoClickerSettings.clickButton=clickButtonSelect.value;
  autoClickerSettings.dragClick=dragClickToggle.checked;
  isAutoClickerActive=true;updateAutoClickerUI();
  var base=1000/autoClickerSettings.cps;
  if(autoClickerSettings.dragClick)startDragClick();
  else autoClickerInterval=setInterval(performClick,Math.max(10,base));
  showNotification('Auto Clicker Started','Auto clicker is now active.','success');
}
function stopAutoClickerFunc(){
  if(!isAutoClickerActive)return;isAutoClickerActive=false;updateAutoClickerUI();
  if(autoClickerInterval){clearInterval(autoClickerInterval);autoClickerInterval=null}
  if(dragClickTimeout){clearTimeout(dragClickTimeout);dragClickTimeout=null}
  isDragClickActive=false;showNotification('Auto Clicker Stopped','Auto clicker stopped.','info');
}

function performClick(){
  try{
    var iw=mainIframe.contentWindow,id=mainIframe.contentDocument;if(!iw||!id)return;
    var w=id.documentElement.clientWidth||800,h=id.documentElement.clientHeight||600,x=w/2,y=h/2;
    var el=id.elementFromPoint(x,y);if(!el)return;
    var btn=autoClickerSettings.clickButton==='left'?0:2;
    el.dispatchEvent(new MouseEvent('mousedown',{view:iw,bubbles:true,cancelable:true,clientX:x,clientY:y,button:btn}));
    el.dispatchEvent(new MouseEvent('mouseup',{view:iw,bubbles:true,cancelable:true,clientX:x,clientY:y,button:btn}));
    el.dispatchEvent(new MouseEvent('click',{view:iw,bubbles:true,cancelable:true,clientX:x,clientY:y,button:btn}));
  }catch(e){}
}
function startDragClick(){if(!isAutoClickerActive||!autoClickerSettings.dragClick)return;isDragClickActive=true;performDragClickCycle()}
function performDragClickCycle(){if(!isAutoClickerActive||!isDragClickActive)return;performClick();var base=1000/autoClickerSettings.cps;if(Math.random()<.3){var d=autoClickerSettings.dragDuration*1000,r=autoClickerSettings.restDuration*1000;dragClickTimeout=setTimeout(performDragClickCycle,d+r)}else dragClickTimeout=setTimeout(performDragClickCycle,Math.max(10,base))}

function saveAutoClickerSettingsFunc(){updateCps();autoClickerSettings.clickType=clickTypeSelect.value;autoClickerSettings.clickButton=clickButtonSelect.value;autoClickerSettings.dragClick=dragClickToggle.checked;autoClickerSettings.keyboardType=keyboardTypeSelect.value;localStorage.setItem('autoClickerSettings',JSON.stringify(autoClickerSettings));showNotification('Settings Saved','Auto clicker settings saved.','success')}
function loadAutoClickerSettings(){var s=localStorage.getItem('autoClickerSettings');if(s){try{autoClickerSettings=JSON.parse(s);cpsInput.value=autoClickerSettings.cps;cpsRandomSlider.value=Math.round(autoClickerSettings.cpsRandomOffset*100);cpsRandomValue.textContent=autoClickerSettings.cpsRandomOffset.toFixed(2);clickTypeSelect.value=autoClickerSettings.clickType;clickButtonSelect.value=autoClickerSettings.clickButton;dragClickToggle.checked=autoClickerSettings.dragClick;toggleDragClickSettings();dragDurationSlider.value=Math.round(autoClickerSettings.dragDuration*100);dragDurationValue.textContent=autoClickerSettings.dragDuration.toFixed(2);restDurationSlider.value=Math.round(autoClickerSettings.restDuration*100);restDurationValue.textContent=autoClickerSettings.restDuration.toFixed(2);durationRandomSlider.value=Math.round(autoClickerSettings.durationRandomOffset*100);durationRandomValue.textContent=autoClickerSettings.durationRandomOffset.toFixed(2);keyboardTypeSelect.value=autoClickerSettings.keyboardType;toggleKeyboardSettings();updateAutoClickerUI()}catch(e){}}}

async function downloadSource(){try{var r=await fetch(mainIframe.src);if(!r.ok)throw new Error('HTTP '+r.status);var t=await r.text();var b=new Blob([t],{type:'text/html'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='source.html';a.click();URL.revokeObjectURL(a.href);showNotification('Downloaded','Source downloaded.','success')}catch(e){showNotification('Error','Could not download source.','error')}collapseMenu()}

function toggleFullscreen(){isFullscreen?exitFullscreen():enterFullscreen();collapseMenu()}
function enterFullscreen(){var el=mainIframe;if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();isFullscreen=true;btnFullscreen.querySelector('.icon').textContent='fullscreen_exit';btnFullscreen.querySelector('.text').textContent='Exit'}
function exitFullscreen(){if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();isFullscreen=false;btnFullscreen.querySelector('.icon').textContent='fullscreen';btnFullscreen.querySelector('.text').textContent='Fullscreen'}
function handleFullscreenChange(){isFullscreen=!!(document.fullscreenElement||document.webkitFullscreenElement);btnFullscreen.querySelector('.icon').textContent=isFullscreen?'fullscreen_exit':'fullscreen';btnFullscreen.querySelector('.text').textContent=isFullscreen?'Exit':'Fullscreen'}

function openCloakModal(){cloakModal.classList.add('active');collapseMenu()}
function closeCloakModal(){cloakModal.classList.remove('active');loadCloakSettings()}
function toggleCustomCloakOptions(){if(defaultCloak.checked){customCloakOptions.classList.remove('expanded');resetToDefaultCloak();localStorage.setItem('defaultCloak','true')}else{customCloakOptions.classList.add('expanded');localStorage.setItem('defaultCloak','false')}}

function populateIconGrid(){
  iconGrid.innerHTML='';
  iconOptions.forEach(function(ic){
    var el=document.createElement('div');el.className='icon-option';el.dataset.icon=ic.url;
    var img=document.createElement('img');img.className='icon-img';img.src=ic.url;img.alt=ic.name;
    var nm=document.createElement('div');nm.className='icon-name';nm.textContent=ic.name;
    el.appendChild(img);el.appendChild(nm);
    el.addEventListener('click',function(){document.querySelectorAll('.icon-option').forEach(function(o){o.classList.remove('selected')});el.classList.add('selected');selectedIcon=ic.url;fileUpload.value=''});
    iconGrid.appendChild(el);
  });
  if(iconGrid.firstElementChild)iconGrid.firstElementChild.classList.add('selected');
}

function handleImageUpload(e){
  var file=e.target.files[0];if(!file||!file.type.startsWith('image/'))return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var el=document.createElement('div');el.className='icon-option selected';
    var img=document.createElement('img');img.className='icon-img';img.src=ev.target.result;img.alt='Custom';
    var nm=document.createElement('div');nm.className='icon-name';nm.textContent='Custom';
    el.appendChild(img);el.appendChild(nm);
    document.querySelectorAll('.icon-option').forEach(function(o){o.classList.remove('selected')});
    iconGrid.appendChild(el);selectedIcon=ev.target.result;
    el.addEventListener('click',function(){document.querySelectorAll('.icon-option').forEach(function(o){o.classList.remove('selected')});el.classList.add('selected');selectedIcon=ev.target.result});
  };
  reader.readAsDataURL(file);
}

function resetToDefaultCloak(){document.title='loader';var f=document.getElementById('cloakFavicon');if(f)f.href='https://jimmyqrg.github.io/jq.ico';document.querySelectorAll('link[rel="icon"],link[rel="shortcut icon"]').forEach(function(l){l.href='https://jimmyqrg.github.io/jq.ico'})}

function loadCloakSettings(){
  var sd=localStorage.getItem('defaultCloak'),si=localStorage.getItem('cloakIcon'),st=localStorage.getItem('cloakTabName');
  if(sd!==null){defaultCloak.checked=sd==='true';toggleCustomCloakOptions();if(defaultCloak.checked)resetToDefaultCloak();else{if(st)document.title=st;if(si){var f=document.getElementById('cloakFavicon');if(f)f.href=si;document.querySelectorAll('link[rel="icon"],link[rel="shortcut icon"]').forEach(function(l){l.href=si})}}}
  if(si){selectedIcon=si;document.querySelectorAll('.icon-option').forEach(function(o){o.classList.remove('selected');if(o.dataset.icon===si)o.classList.add('selected')})}
  if(st)tabName.value=st;
}

function applyCloakSettings(){
  localStorage.setItem('defaultCloak',defaultCloak.checked);localStorage.setItem('cloakIcon',selectedIcon);localStorage.setItem('cloakTabName',tabName.value);
  if(!defaultCloak.checked){if(tabName.value)document.title=tabName.value;var f=document.getElementById('cloakFavicon');if(f)f.href=selectedIcon;document.querySelectorAll('link[rel="icon"],link[rel="shortcut icon"]').forEach(function(l){l.href=selectedIcon})}
  else resetToDefaultCloak();
  closeCloakModal();
}

function showNotification(title,msg,type){
  document.querySelectorAll('.notification').forEach(function(n){n.remove()});
  var n=document.createElement('div');n.className='notification'+(type==='error'?' error':type==='success'?' success':'');
  n.innerHTML='<div class="notification-title">'+title+'</div><div class="notification-message">'+msg+'</div>';
  notificationContainer.appendChild(n);
  setTimeout(function(){n.classList.add('show')},10);
  setTimeout(function(){n.classList.remove('show');setTimeout(function(){n.remove()},300)},5000);
}

init();
</script>
<script src="/js/openGame.js"></script>
</body>
